body:
  text: 大乘經畢次及小乘阿含部也亦名阿笈多無比法之稱本該大小然小獨專其稱阿含有四人天因果為增一破邪見為長明深義為中明禪法為雜一心奉請增一阿含經拜觀同上符秦兜佉勒國沙門曇摩難提譯序品第一先偈讚次彌勒告賢劫次士及諸天共流布法阿難以囑優多羅迦葉問何以獨囑增一何以獨囑優多羅答曰增一即是一切法優多羅曾受持七佛法故十念品第二念佛法僧施戒天又念休息念安般念身非常念死廣演品第三廣說十念法門弟子品第四佛說百比丘各有第一法比丘尼品第五說五十尼功德清信士品第六說四十優婆塞功德清信女品第七說三十優婆斯功德阿須倫品第八說阿須倫欲犯日而不能喻波旬不能得如法比丘六根之便次說如來一人出世饒益多人令人入道有智慧光消滅無明現助道法如來若沒人民失蔭若復出世人民光澤三惡減少無能及者一子品第九說一子一女喻誡比丘善念專心求於果證次說不見一法捷於心者次說不見一法炫惑於人如女色者次說亂想過失不淨想力用護心品第十謂無放逸修善法及說施主果報亦勸比丘修福修信不還品第十一說滅一法成阿那含謂欲也恚也癡也慳也次說心難降伏則受苦心易降伏則受樂次說財利為害最重提婆達因利養入泥犁一入道品第十二說一入道能證泥洹謂滅五蓋思惟四意止次勸修慈三業說佛為世尊說瞻病功德阿練若頭陀功德讚迦葉年老不捨頭陀行能令佛法久住於世成就三乘道果次說提婆達因利養障無上道次明提婆達愚人不知善惡報故作是說何處有惡惡從誰生誰作此惡而受其報次更二番訶利養過利養品第十三說修羅陀因利養退道佛滅味欲而證道摩利夫人說愛別離苦以悟王心佛及舍利弗為長者說身心有患無患法佛為婆羅閔說二十一結必墮惡趣一瞋二害三眠四調五疑六怒七忌八惱九嫉十憎十一無慚十二無愧十三幻十四姦十五僞十六諍十七憍十八慢十九妒二十增上慢二十一貪息此二十一結修慈悲喜護便證三明佛以偈答帝釋釋問須菩提病五戒品第十四說殺等墮三塗不殺等人天得道有無品第十五初說有無二見過患外別二施二業二恩智愚二像貌思惟二法禮如來禮法塔寺二因緣起正見謂受彼教誨內思止觀火滅品第十六難陀成道魔擾之而不動為波斯匿王說法佛為比丘說二涅槃烏猪二喻驢牛二喻善不善二行邪正二法法忍思惟二力阿那律為梵志說法佛記羅云漸當得道安般品第十七佛為羅云說安般法令證果位說如來輪王出世甚難支佛羅漢亦難二法甚為煩惱邪見一切不可貴正見一切可貴欲無厭足如頂生王善惡知識如黑白月貢高為惡知識不貢高為善知識周利槃特伽與舍利弗化世典婆羅門提婆達勸太子弒父佛為比丘說當捨非法行正法慚愧品第十八讚慚愧二法分別二無厭足當習法施勿習食施令迦葉受梵志婦食俾其夫婦證果降伏醉象令大衆獲益執難陀見天堂地獄而令證果為大愛道說禮佛法說二人謗法謂法說非法非法說法二人獲福謂稱舉應稱舉者不稱不應稱者勸請品第十九佛初成道梵王請轉法輪為五比丘說捨苦樂二事行八正中道為天帝說斷欲法目連重往驗之佛說二人無恐怖師王羅漢二法無智慧不問不精進二法常貧賤阻施及不施二法生貧家不孝不事勝佛涅槃後須深女問大拘絺羅優踏藍弗等二人何時盡苦際迦遮延為婆羅門說老地壯地法佛說二人難得一說法二聞法奉行為諸童子說應念返復不忘小恩善知識品第二十歎善知識訶惡知識受其懺悔而證果為曇摩留支說錠光佛時事為比丘說師子似羊法訶懈怠勸修止觀恭敬精進無信慳貪難與說法供養父母及補處菩薩得大報教朱利槃特誦掃帚悟除垢義教比丘除愛則離愛怨二苦三寶品第二十一明三歸之德及三福業一施二平等四無量心三思惟七覺支次明三緣受胎應方便求斷次明欲起慈心應緣三寶次因瞿波離謗二尊者墮大地獄勸修三善行次明三法盡漏謂根寂靜節飲食恆經行次明風痰冷三患酥蜜油良藥貪瞋癡三患不淨慈心因緣為良藥次明三惡應捨三善應修次明欲色痛各有味有過有捨離法次明應於三不勞要求成勞要謂身命財三供養品第二十二如來羅漢輪王應供養以四念處滅三痛愚智各以三業成三相三法戒定慧不可覺支覺則成道三法可愛不可保謂少無病長壽三事速入惡趣謂貪欲睡眠掉戲三法無厭足謂貪欲飲酒睡眠地主品第二十三佛為波斯匿王說作福無厭猶如昔王帝釋試婆拘盧能說法佛以琴喻化二十障耳比丘佛為波斯匿王說婆提長者因緣勸行廣施佛為阿難說戒聞思三妙香佛因提婆達說比丘不著利養能獲戒定慧說三不善根墮三惡三善根生人天三聚謂邪正不定分別三惡觀三善觀果報高幢品第二十四念三寶得無畏猶諸天念三幢勝修羅為毗沙鬼說法救那優羅小兒為釋種說法王勝於輪王為比丘說無常為五比丘說法乃至度三迦葉度釋種為比丘說三齊日天王使者太子及自身觀察世間應受八齊法為比丘說三事現在前獲福無量一信二財三梵行為鬥諍比丘說長壽王事為大將讚阿那律等三人為比丘說三結使過患一身邪二戒盜三疑為比丘說三三昧四諦品第二十五說知四諦者出苦不知者墮五道中說四饒益法一親近善知識二聞法三知法四法法相明說如來出世便成四未曾有法說擔持擔擔因果捨擔說四生應捨離舍利弗說四人謂有結無結各論知與不知佛說生熟四果似四種人說鳥聲形四料簡說雲雷雨四料簡皆喻比丘四喻斷品第二十六說無放逸修行四意斷如地如輪王如月如婆斯華為匿王說先暗後明等四人為比丘說老病死愛別離四不可喜應覺四法謂戒定慧解脫為匿王說老病苦無常猶四山來合說諸行無常苦無我涅槃休息舍利弗為衆說四辨佛為舍利弗說四不可思議事謂世界衆生龍及佛土因舍利目連滅度佛為阿難說四人應起塔論輪王聲聞辟支如來說婆迦梨比丘得四諦魔欲覓其生處不可得等趣四諦品第二十七佛敕人親近舍利弗目連聞其廣演四諦義佛說外道不能分別四受謂欲受戒受見受我受佛為長者說至心布施及三歸五戒慈心厭離功德轉勝佛為比丘說日出喻為彌勒說四法具足六度為比丘說四無畏說四衆博古通今多聞為第一說四金翅鳥食四龍而不能食事佛者以如來行四等心故說惠施有四功德不可思量謂知時自手淨潔極妙說四人可敬謂持信奉法身證見道聲聞品第二十八目連迦葉阿那律共化跋堤長者賓頭盧化老母難陀佛因長者為比丘說三歸五戒法許分分受佛說日月四翳喻欲恚癡利養四結佛為童子說四種座卑座天座梵座佛座佛鹿頭梵志擊骨辨男女病原及所生處不辨羅漢骨梵志因出家成道說四界八界義佛為比丘說四大廣演之義謂契經律阿毗曇戒或非經本或是義說或戒行與味相應或真是佛說佛為匿王說世間四事先苦後樂亦為比丘說四事先苦後樂謂梵行誦習坐禪數息能得四禪四果之樂佛說四果一如黃藍華一如芬陀利一似柔軟一柔軟中柔軟苦樂品第二十九說先苦後樂等四人說身樂心不樂等四人說四梵福一起塔二治故寺三和合聖衆四請轉法輪說四食宜捨離說四辨宜求成就說四事不可思議當思四諦說四神足當修行說四起愛法莫貪著謂四事供養說四姓出家同名釋子說四河入海說四等心名為梵堂頭陀品第三十須陀沙彌隨佛問答佛印讚之許其即為比丘老比丘舒腳眠小沙彌正身坐佛說眠者當生龍中坐者當見四諦阿那邠邸長者女修摩提嫁滿財長者子令其家供佛僧同悟道增上品第三十一為生漏梵志說閒居處修成道法為比丘說善知識應以四事教諸父母知親謂恭敬三寶受持戒律為比丘說四事行跡謂苦樂各有愚惑速疾應奉行苦速疾行迹為四梵志不免無常說四法本所謂無常苦無我滅盡為涅槃說諸天四圍四池比丘亦四園四池四等為園四三昧為池說四蛇五持刀六怨冢喻說身口意善生善處惡生惡處修四禪得盡漏說初苦行不得道依戒定慧解脫四賢聖道而成佛為天人說四流四樂四諦法說比丘當修無常想為二弟子訶勝負心善聚品第三十二說信等五根為善聚貪等五蓋為不善聚說禮佛五功德說佛以天眼見閻羅王將五天使詰責罪人及說地獄衆苦誡諸比丘當滅五結修行五根說自恣時衆僧清淨印讚多耆奢造偈第一說天子五衰相現歸佛得免惡道為長者子出家證道尊者那羅陀為文茶王說除憂經謂除去五愁憂刺佛說病人五法難差五法易差又說瞻病人五法難差五法易差佛為師子大將說惠施五德又為比丘說惠施五功德又說應時施有五事五王品第三十三五國主各論一塵微妙佛言平等論之隨所好則各妙然各有過失各有出要佛為佛光長者記其子尸婆羅當出家後果同五百童子出家福德第一并說其往因佛兩番說五戰鬥人皆喻比丘佛說掃地五事掃塔五事長遊五難不多遊五功德恆一處止五非法不一處住五功德破戒受供甚於猛火等見品第三十四舍利弗說戒成就人乃至阿那含人皆當思惟五陰苦惱說流離王滅釋因果本末諸天有五衰出家有五毀辱法髮長爪長衣垢不知時宜多有所論雞鳴梵志以二金錢營供諸天助之乃至出家成道佛說世間五事最不可得不喪不盡不老不病不死五人不可療治諛諂奸邪惡口嫉妒無反復修羅謂諸天無法則被天縛比丘與結使則被魔縛為阿難五陰名盡法為生漏梵志說使民減少因緣邪聚品第三十五五邪聚相應笑不笑應喜不喜應慈不慈作惡不恥聞善不著意反是為正聚相如來出現必為五事一轉法輪二度父母三無信令信四使發心五受佛決五施無福一刀二毒三野牛四淫女五神祠五施福大一園觀二林樹三橋梁四大船五住處說女人以五力輕夫夫以富貴力蔽之魔以五塵力縛人人以無放逸力勝之說女人有五想比丘亦應有五想謂戒聞定慧解脫說五時不應向人禮塔中衆中道路臥病飲食因度毗舍羅長者而說湯施之德為欲捨戒比丘說女人五難多耆奢比丘觀五陰而斷欲證果僧伽摩比丘七返降魔聽法品第三十六說隨時聽法五功德作浴室五功德施楊枝五功德屠牛人無善根目連降二龍佛往忉利為母說法優填王造栴檀像波斯匿王造金像佛從天下五王起大神寺六重品第三十七三業皆慈及同利同戒同見為六重舍利弗三昧目連不知然目連神通第一舍利弗等各說牛師子園快樂之法佛咸印之佛說呪願六德施主成就信戒聞彼物成就色味香佛說比丘欲求佛教得四事知足多知識求四禪求八解求天耳求心通神足宿命天眼漏盡皆當念戒舍利弗為比丘說六法入地獄六法生天六法至涅槃佛為比丘說第一空法謂觀六入因緣生滅為生漏梵志說剎利乃至比丘所欲所行所著所究竟各各不同又為梵志說不修事薩遮尼乾子受佛化命終生天力品第三十八說凡常六力小兒啼女人恚沙門梵志忍國王慢羅漢專精佛大慈悲應學大慈悲力不修無常想墮惡道修者生人天得涅槃佛為梵志說內外六塵六入法佛說未成道時思惟十二因緣如見古昔王城佛訶阿那律遂以不眠失目得天眼補衣時佛為貫針說六法無有厭足一施二教戒三忍四法說義說五將護衆生六求無上道佛降央掘魔令悟如來滅六見法出家證果以致誠言而救産難忍打罵辱并為比丘說其往因佛說諸山前後各有異名唯仙人山更無異名佛敕比丘專念修己謂觀六情佛勸修無常想說古時女人因辟支佛說法思惟六情無主得生梵天佛為波斯匿王說正法治化增六事功德王亦讚佛以六事應受禮拜佛為毗舍離除疫病苦說二千五百寶蓋夙因所致輸盧比丘尼降伏六師佛說六情染著則流轉思惟不淨即成道迹等法品第三十九明七法得樂得果知法知義知時自知知足知衆觀察衆人說樹喻水喻王治七法喻淨戒護根多聞方便四增上心四神足分別陰界入緣起說七神識住處敕病比丘均頭說七覺意而病愈說輪王七寶法王七覺有比丘慕輪王快樂佛令修梵行證果有天語童真迦葉七喻迦葉問佛知義而證果富樓為舍利說七車喻七日品第四十說七日出時世界無常及說成劫漸有四姓說跋祗人修七法不為外寇所壞比丘亦有七不退轉法魔不得便說貪瞋癡慢疑見欲七使七覺治之說七人可事可敬慈悲喜護空無相無願也說毗羅先長者七日應命終墮落阿難度令出家一日修十念生天上說淨諸漏法或緣見或恭敬或親近或遠離或娛樂或威儀或思惟說七事增益起伽藍施牀座施食施雨衣施藥作井作近道舍說思惟死想宜於出入息中為波斯匿王說七倮形等非是梵行人迦旃延廣演佛所說不著世不住世義莫畏品第四十一說斷三結名不退轉義敕摩訶男莫生怖畏那伽波羅度長老梵志成道佛敕比丘觀七處善又察四法舍利弗為北遊比丘說八道七覺迦葉不捨頭陀行佛以法寶付囑之并付阿難八難品第四十二說三途長壽天邊地根缺邪見無佛世為八難八大地獄宜修八正道以絶其因佛以父母力起石令力士降伏度君茶羅比丘尼讚阿難有四未曾有法為阿難說待女人法罰車匿法又度五百摩羅及摩須跋佛因阿須倫說八法如海佛說八緣天地大動佛說阿那律說戒勝於聞及說八大人念少欲知足閒居戒三昧智慧解脫多聞精進佛說八部衆剎利婆羅門長者沙門四王三十三天魔梵以八法勝之阿那邠邸長者八處惠施佛讚歎之并說福田勝劣說惠施八德隨時鮮潔親手誓願不望報求滅施良田回向衆生八邪趨泥犁八正向涅槃馬血天子品第四十三佛為馬血說八正能盡世界邊際佛說八關齊法及發願功德引古本生事為證因水漂木說無八事便至海喻人無遮便至涅槃牧牛難陀因發心出家并問其義佛言此岸是身邪彼岸身邪滅中沒者欲愛岸上者五欲人捉求王福非人捉求天回轉是邪疑腐敗是八邪佛因提婆達說利養能害八正道佛為比丘說筏喻敘昔降魔之事佛說牧牛渡水愚黯喻佛度阿闍世王得無根信佛說比丘應除世八法八人不住生死謂四果四向九衆生居品第四十四說九衆生居說嚫願九德施主三法信願不殺物三法色香味受者三法戒慧定說惡比丘成九法不成道一強顏二耐辱三貪心四慳著五健忘六邪思七隱匿八無返復九念不捨離說孔九喻喻比丘九善法一端正二清徹三庠序四知時五知節六知足七念不分散八少睡九少欲女人九法繫縛男子當念捨之說諸法之本謂不著地乃至涅槃佛看比丘病敕比丘看病九人可教謂四果四向及種性人佛為滿呼王子顯朱利槃特之德佛為阿難說善知識是全梵行為帝釋說衆生性行不同馬王品第四十五婆羅門獻女於佛佛不受有一比丘欲受佛為說女人九惡并說往昔商人墮羅剎國乘馬王度難佛為舍利目連說九法不得長大九法有所成辦佛說比丘應念少欲知足佛為惡魔說拘留孫佛時事明世間四食段觸思識出世五食禪願念解脫喜佛說比丘應修慈心如食金剛佛為舍利弗讚空三昧佛應尸利掘長者火坑毒食之請令其見諦結禁品第四十六說十事功德結戒說聖賢所居之處有十事說如來成就十力知五陰四諦因緣生滅說如來十力四無所畏說十念謂六念加止觀安般身與死也說比丘親近國家有十非法說國王十非法十法比丘亦十非法十法十法者持戒敬佛敬法敬僧少欲隨戒坐禪閒靜事善知識多聞說十論十義十演一依食二名色三受四諦五根六重七神止處八世法九衆生居十念勸比丘修十想一白骨二青瘀三肨脹四食不消五血六噉七無常八貪食九死十不可樂佛為比丘訶欲想令重修十想證果善惡品第四十七說十惡墮落十善生天十念滅度說十惡果報說知善惡罪福名知幻者警世論比丘當論十功德論亦警求四事者亦警分別國主善惡者亦警評論波斯匿王者為羅云施主說平等施法為均頭說十善除滅邪見論壽命長短事十不善品第四十八廣說十不善果報說七佛略廣二戒因緣說彌勒佛時事說七佛事為師子長者說供僧福多及讚平等行施說金剛三昧力不畏水火牧牛品第四十九佛說牧牛得失各十一法比丘得失亦各十一法知色知相知磨刷知護知起煙知良田茂草知所愛知擇道行知渡處知止足供奉長老比丘應成就十一法戒定慧解脫解脫知見根寂知足修法知方便分別義不著利并讚十一苦行迦葉比丘因佛十大弟子并提婆達各將衆遊行因說善惡類從象舍利弗還俗重出家證果為諸人民說十一法阿羅漢所不習一捨戒二不淨三殺生四盜五殘食六妄語七羣黨八惡言九狐疑十恐懼十一受餘師及受胞胎又分別五通六通不同佛為比丘釋十二因緣法并為阿難說其甚深翅蜜梵志聞法請佛施羅梵志出家證果佛讚一坐食法佛說有習行沙門有誓願沙門及說沙門法行婆羅門法行敘提婆達出家得神足造逆墮地獄悔心蒙授記及目連問訊始末佛說慈心十一果報臥安覺安無惡夢天護人愛不毒不兵水火盜賊俱不侵得生梵天禮三寶品第五十說禮佛寺十一法禮法十一法禮僧十一法說過去轉輪王以法相繼事敕阿難莫增減所受持法