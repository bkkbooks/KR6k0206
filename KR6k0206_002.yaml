丘不改過佛以神足至阿那律等三人住處見其習無事而讚之并為修天眼法二天品經佛為比丘說自己修行得光明事凡八事謂見形色說乃至曾生此天等三八念經阿那律陀作是七念道從無欲非有欲得及知足遠離精勤正念定意智慧一一對明佛知其所念便往讚之并為說道從不戲樂不戲行不戲得非從戲樂戲行戲得是名八大人念四淨不動道經說三種淨不動道三種淨無所有處道一淨無想道及說涅槃聖解脫五郁伽支羅經為一比丘略說法要謂四念處應與三定四共俱禪并修亦修四無量心必得果證六娑雞帝三族姓子經為阿那律等三年少說離欲法乃至說授四輩生處記義七梵天請佛經佛知梵天邪見無常計常往為說法并訶魔說令梵天得正見八有勝天經仙餘財主請阿那律飯問大心無量心義阿那律為分別之并說光天淨天遍淨光差別因果九迦絺那經八百比丘并世尊共為阿那律作衣佛敕阿那律為衆說法從信心出家持戒護根除蓋得禪乃至證六通三明是名迦絺那法十念身經為諸比丘廣說念身法成就十八功德十一支離彌梨經拘絺羅訶質多羅象子比丘不恭敬不善觀并為其親友比丘說種種退失法喻於後象子果捨戒還俗十二長老上尊睡眠經因目連晝眠佛為說除睡法并說究竟梵行法十三無刺經因諸比丘知聲為定刺佛為更說犯為戒刺嚴飾為護根刺乃至欲恚癡三刺唯阿羅訶離之十四真人經佛為比丘說恃善法者為不真人法不自貴賤他為真人法十五說處經教阿難訓誨年少比丘說處謂應說五盛陰內六處外六處六識身更樂覺想思愛六界緣起念處正斷如意四禪四想四無量四無想四無色四聖種四果五熟解脫想五解脫處五根五力五出要戒七財七覺八正又說頂法及頂退法穢品第八一穢經舍梨子分別內有穢外無穢各有二種不知如真者皆最下賤知如真者皆最勝為勝買銅盤喻又說盛糞盛食喻二求法經佛說比丘宜求法莫求飲食又說上中下弟子隨師不隨師功過舍梨子因即廣明三可毀三可稱法及說中道斷欲斷貪等又有中道謂八聖道三比丘請經目連說比丘應請諸尊教我訶我莫難於我及說成就戾語法及善語法者過失功德并說照鏡之喻四知法經周那說比丘知法不知法者猶貪稱富及富稱貧五周那問見經佛為周那說漸損法發心法對法升上法涅槃法六青白蓮華喻經佛說有法從身滅有法從口滅有法但從慧見滅謂能修身戒心智如蓮水生水長而不著水七水淨梵志經佛因水淨梵志告諸比丘有二十一穢污於心者必至地獄謂邪見非法欲惡貪邪法貪恚睡眠掉悔疑惑瞋纏不語結慳嫉欺誑諛諂無慚慢大慢憍傲放逸若不污心必至善處為梵志說淨洗以善法偈令梵志悟八黑比丘經因黑比丘喜鬥諍佛說不可愛及可愛法亦說惡馬良馬喻九住法經佛說比丘於善法有退有住有增須自觀知善不善法求斷求增如救頭然十無經舍梨子說淨法衰退及轉增之由又說斷惡修善如救頭然之喻因品第九一大因經佛為阿難廣明緣起甚深又明七識住及二處於此知如真者名慧解脫兼修八解脫者名俱解脫二念處經說三世諸佛皆斷五蓋住四念處修七覺支而證道因廣明四念處觀三苦陰經上因異學亦言知斷欲斷色斷覺比丘以此白佛佛為分別欲味欲患欲出要色覺亦爾四苦陰經下釋摩訶男生染恚癡法佛為說欲味欲患若知如真不為所覆便得無上息五增上心經比丘欲得增上心者當數數念於五相一念相善相應二觀念惡患三不念念四以思得漸減念五以心修心受持降伏六念經分別諸念作二分欲恚害念作一分無欲恚害念作一分若生欲恚害念須不受斷除吐若生無欲恚害念須速修習廣布次應治內心常住在內止息一意得定向法次法乃至證四禪斷諸漏七師子吼經謂斷一切受知欲受戒受見受我受以無明為本無明盡者不復更受此四受尊信此師信此法具戒德敬同學乃堪師子吼曰此有第一第二三四沙門此外更無沙門梵志八優曇婆羅經實詣居士詣異學園異學欲以一論滅瞿曇如弄空瓶佛至其園為說苦行穢不穢法總名不了亦說正解脫法異學屈服但以魔力所持而不發心九願經因一比丘心願佛與慰勞共語說法得具足戒而不廢禪成就觀行於空靜處佛乃廣述比丘所應願事十想經謂若計地是神便不知地不知地即是神彼便知地乃至一切悉皆如是林品第十一林經上料簡四種所住林或不得正念等雖有四事不應住或可得正念等雖乏四事不應去或二俱不得應夜半而去莫與彼別或二俱得應盡命住二林經下四料簡與上同此約得沙門義說三自觀心經上料簡止觀得不得有四句不得者方便令得得者當求漏盡四自觀心經下觀瞋恚乃至惡慧等多少有無有惡須斷有善須求漏盡五達梵行經知漏知漏因知報知勝如知盡知滅道如是覺想欲業苦一一知因乃至知道是謂達梵行能盡一切苦六阿奴波經記提和達多入地獄并為阿難說大人根智善知六種人七諸法本經欲為諸法本更樂為和覺為來思想為有念為上主定為前慧為上解脫為真涅槃為諸法訖八優陀羅經說優陀羅不知癰本雖生非非想處還墮貍中比丘應知身為癰愛為癰本六更觸處為一切漏九密丸喻經先為執杖釋說宗本法執杖不是不非而去次為比丘略說即入室坐諸比丘轉問大迦旃延然後白佛印可十瞿曇彌經大愛道三請出家佛三止之因阿難為請乃制八尊師法後又請求年少比丘敬禮老尼佛為說減正法事大品第十一一柔軟經佛說在家時受用但為老病死而出家二龍象經佛說唯佛為大龍烏陀夷因作頌讚三說處經比丘有三說處為二世有又以二種四處觀人知可共說不可共說四說無常經謂觀五陰無常得證果五請請經佛因說戒時唱言我是後邊身汝等真法子身口意清淨無枝亦無葉舍梨子因作頌讚六瞻波經說戒時有犯戒者佛默不說目連牽犯戒者出佛種種訶犯戒之罪七沙門二十億經二十億比丘精進而不證果心生退悔佛為說彈琴喻遂盡諸漏向佛現說所證之義八八難經謂學道有八難唯有一不難九貧窮經以無善法財喻貧窮以惡行喻舉貸以覆藏喻長息以梵行所知為責索以頻生三惡念為數往求索以墮惡道喻被收縛十行欲經為給孤居士說十種行欲人非法三法非法三如法四十一福田經為給孤居士說二種福田謂十八學人九無學人十二優婆塞經佛說優婆塞善護五戒及念佛法僧戒必得證果十三怨家經謂瞋恚是怨家妨人七事一妨好色二妨安眠三妨得利四妨友朋五妨名稱六妨大富七妨生善處十四教曇彌經曇彌罵責比丘比丘皆去諸優婆塞乃逐曇彌佛為曇彌說樹神喻教彼住沙門法十五降魔經魔入目連腹中目連喚出為說昔日波旬擾佛弟子受大苦報汝即我甥事魔乃怖而降伏十六賴吒和羅經賴吒和羅居士子聞佛說法發心出家父母不許臥地不食許已方起臥地證果後還父家不被財色所動為父母說法次為拘牢婆王說信如來所說四事故出家一此世無可依恃二必趨老三必無常四無厭足十七優婆離經苦行尼犍與佛論議立身罰最重佛立意業最重優婆離居士從尼犍處欲來難佛反受佛化證果斷邪不聽尼犍入門十八釋問經天王先遣五結樂子以琴歌見佛次來問法佛為說因思有念因念有欲因欲有愛不愛因愛不愛有慳嫉結生大苦陰及說八正道護六根等天王證初果發願來生出家十九善生經善生居士奉父遺命敬禮六方佛為說離四惡業四惡行六非道四似親應知四善親及內法六方謂東為父母南為師尊西為妻子北為婢使下為友臣上為沙門梵志二十商人求財經先說往古商人入海墮羅剎國乃至乘天馬時若稍念男女情愛即便墮落次正說比丘若計根塵陰界是我者必皆被害二十一世間經明如來知苦斷集證滅修道自覺覺他從成道至涅槃所說皆實二十二福經明住昔七年行慈福報勸人修福二十三息止道經謂初學比丘常應念骨相青相腐相食相骨鎖相除欲恚病二十四至邊經謂欲盡苦甘行乞食而復不修沙門法行如墨浣墨如血除血從冥入冥二十五喻經謂無量善法以不放逸為本如地如波水栴檀青蓮須摩象迹師王乃至如如來等梵志品第十二一雨勢經未生怨遣雨勢大臣問佛跋耆國事佛為說彼國行七不衰法必當得勝大臣去後佛為比丘說七種七不衰及六慰勞法二傷歌羅經摩納言齊行有無量福迹道行唯一福迹阿難三問而屈服之佛為說三輪示現法摩納歸信三算數目犍連經此梵志以堂及算法為喻問佛法中次第佛為分別說之次問何緣有得究竟有不得究竟佛為說問路喻四瞿默目犍連經佛涅槃後阿難往此田作人所彼問可有比丘與佛等者適遇雨勢大臣來到重復問之阿難答以無有此人次說有法可依及有十德可敬訶貪讚四禪雨勢去又答三種解脫無有勝如五象迹喻經異學卑盧為生聞梵志說象迹喻以讚於佛生聞見佛佛為具足說此法喻謂從出家護根除蓋成四禪證無漏方為極大象迹六聞德經為生聞說傳聞誦習差別功德謂從捨家乃至證滅七何苦經答生聞所問在家出家苦樂之事及饒益天人法觀善惡知識如黑白月八何欲經生聞梵志問剎利居士婦人偷劫梵志沙門各何欲何行何立何依何訖佛一一答之九瘦歌羅經此梵志向佛說四種奉事及四種自有財物佛展轉破之謂如強與他肉而取其直次正作虗空慈心洗浴取火等喻明四姓平等十阿攝和經諸梵志自恃其種獨淨遣阿攝和與佛辨佛亦為說虗空乃至取火等喻又說父母驢馬等喻以屈之十一鸚鵡經佛為此摩納分別在家出家事摩納述梵志所施設五法功德佛折以現知現覺義彼則瞋恚佛為說五法障礙謂欲恚身見戒取疑及說諸法從心起十三鬚間提經此異學見佛臥室而起敬聞佛名而毀訾見佛說離欲法喻而出家證果十三婆羅婆堂經婆私吒及婆羅婆二人皆梵志種出家被諸梵志訶責佛為說劫初漸立四姓事及說善惡業報無差別十四須達多經為此居士說施心差別非關粗妙之物次較勝田從凡夫四人支佛如來不如作四方僧房又不若受歸戒修慈心及作無常觀十五梵波羅延經佛答今之梵志久已越梵志法無復學者十六黃蘆園經佛在園中有百二十歲老梵志來責佛不敬一切佛言若如來起迎請坐者彼人必當頭破七分梵志又訶佛無味無怖不入胎佛言於五欲無味無怖證四禪三明故不入胎梵志乃終身自歸十七頭那經為頭那說五種梵志法如梵如天越界不越界旃陀羅十八阿伽羅訶經此梵志問梵志經典如何依住佛言依於人住展轉問人稻麥地水風空日月四王乃至大梵忍辱溫良忍辱溫良又依涅槃涅槃無依十九阿蘭那經諸比丘共論人命極少宜力行善佛讚印之并說昔時阿蘭那梵志出家說無常法利益無量即佛往因也二十梵摩經梵志梵摩先遣摩納優多羅觀佛三十二相及觀威儀優多羅發心出家次復梵摩自來見佛觀諸相信心歸依證那含果根本分別品第十三一分別六界經佛於陶師屋中為弗迦羅娑利比丘說六界聚六觸處十八意行四住處法二分別六處經為比丘說六處六更樂十八意行等斷彼成就是無量說法內三意止調御一切方法三分別觀法經佛略說如是觀心灑散不住內不受而恐怖如是觀心不灑散住內不受不恐怖說已入室衆請迦旃延說謂根著塵則心灑散著四禪八定則不住內不離五陰則恐怖反是便不灑散等四溫泉林夫經天勸三彌提尊者受持跋地羅帝偈尊者問佛佛說偈曰慎莫念過去亦勿願未來現在所有法念無有堅強如是行精進晝夜無懈怠五釋中禪室尊經天問盧夷強耆尊者尊者問佛佛說偈釋義六阿難說經阿難以偈及義為比丘說佛印之七意行經佛說八定八天處等說滅定為最勝八狗樓瘦無諍經佛為比丘分別諍無諍法九鸚鵡經鸚鵡摩納父轉身為白狗見佛而吠佛言汝不應爾謂汝從護至吠狗瞋極臥地鸚鵡怒而見佛佛為說其成驗再來見佛佛為說業報差別之法十分別大業經異學與三彌提論三業義周那與阿難以此問佛佛訶其不善分別次正說三報受時差別及臨終業惡念不同雖天眼不宜執一非餘唯佛知其所以然耳遂說果喻心品第十四一心經有一比丘問誰將世間去誰為染著誰起自在佛言一切唯心多聞聖弟子不隨心而心隨多聞問多聞義智慧黠慧廣慧義佛言順梵行為多聞知四諦為智慧能利人為廣慧二淨彌經淨彌為王子說梵行得果有願無願亦有無非有無佛說𤚲角及乳稱水及酪壓沙及麻取火母乾濕四喻三受法經上現未苦樂四料簡縱欲制煩惱歡喜修行外道苦行四受法經下以苦樂心修十善惡成四料簡五行禪經衰盛知不知成四料簡六說經八定皆有退住進及漏盡七獵師經以四種鹿羣喻沙門梵志三不退魔境一能脫之謂修四禪四無量四空斷漏八五支物主經此物主先詣異學文祁子處文祁子立四事為第一義謂身在作惡口不惡言不行邪命不念惡念物主以此白佛佛言此則嬰孩皆第一義若多聞聖弟子應知善戒不善戒善念不善念何由生何由滅知已具足人正道乃至正解脫正智是名第一義質直沙門九瞿曇彌經大愛道以金縷衣供佛佛令施比丘衆三勸不從佛為阿難說七施衆十四私施得大福并施受淨不淨四料簡十多界經阿難作是思惟一切恐怖及災患等皆從愚癡生不從智慧佛為廣申明之次問云何名愚癡云何名智慧佛言不知界處因緣是處非處為愚知者為智界者眼等十八地等六欲無欲等六樂苦憂喜捨無明亦為六覺想行識為四欲色無色三色無色滅三過現未三妙不妙中三善惡無記三學無學俱非三漏無漏二為無為二共二十二界處者十二處因緣者十二緣生是處非處者若因若果雙品第十五一馬邑經上說沙門法須身行清淨口意行清淨命行清淨守護諸根正知出入斷五蓋成四禪趨漏盡二馬邑經下謂應息貪伺恚伺乃至邪見成就四無量心乃至漏盡三牛角娑羅林經上舍梨與阿難等各說發起此林之法佛皆讚之并說不起趺坐乃至漏盡是名發起此林四牛角娑羅林經下阿那律等三人在此林中佛往問之各言安隱并說上人之法佛讚歎之長鬼天等展轉讚歎乃達梵天五求解經佛說求解於如來正知如來法六說智經為比丘說與梵行成立人問答法七阿夷那經因異學阿夷那為比丘略說知法非法義非義令學如法如義諸比丘請阿難廣釋謂邪見乃至邪智為非法因此生不善惡法為非義正見等為法所生善法為義八聖道經正定為一道有習有助有具共七支正見最在前并正解脫正智為十支九小空經不念人想不念村想不念無事想乃至不住無想心定十大空經因大比丘集加羅差摩精舍佛為阿難說遠離法及修內空外空內外空不移動法又說正知法讚不放逸法分別煩師煩弟子煩梵行法又誡弟子不恭敬順行者名行怨事反是為慈後大品第十六一迦樓烏陀夷經烏陀夷念世尊深恩讚斷過中食佛印可以此為小事者為癡蠅二半梨破羣那經此比丘與比丘尼數共集會護過瞋諍佛呼而誨之言以信出家應修無欲如調馬治林於時非時等皆習慈悲喜捨如地不可壞恆河不可沸虗空不可畫治皮無瓦聲應常念利刀鋸喻所遊皆安堪證無學三跋陀和利經佛讚一坐食法跋陀和利固辭不堪夏三月竟復往見佛佛種種訶之為說出要又答苦治不苦治問說清淨馬喻四阿濕具經此比丘與弗那婆修二人不遵佛戒過中暮食佛呼而責之為說苦樂覺及修不修義五周那經周那述尼犍諍事於阿難阿難問佛佛為說六諍本七滅法六慰勞六優波離經答問七滅諍等如法不如法事七調御地經王童子不信阿夷那和提所說法阿夷那和提白佛佛為說山下不見園林喻及說調野象喻八癡慧地經說癡慧各三相謂思說作也各受現法三苦樂惡名治罰惡死為三苦善名無罪善死為三樂又有地獄天宮果報九阿梨吒經阿梨吒說欲不障道比丘諫不改佛責之謂法尚應捨況執非法十嗏帝經嗏帝執此識往生不更異佛責之因細明十二因緣生滅脯利多品第十七一持齊經為毗舍法說放牛尼犍齊無福應持聖八支齊更修五念念佛如沐首念法如浴身念佛如浣衣念戒如磨鏡念天如煉金二脯利多經為此居士說八支斷俗事殺盜淫妄貪恚嫉惱慢更有八喻言欲之過離欲得禪盡漏作證居士悟道三羅摩經於此梵志家說聖求非聖求說未成道時先習二定次坐樹下得正覺度五比丘事四五下分結經說依道依迹斷結如入林求實亦如河度山水五心穢經說比丘須拔心中五穢謂疑佛疑法疑戒疑教疑梵行者又須解身中五縛謂身縛欲縛說縛聚會縛升進縛次應修五法謂四如意足及堪任六箭毛經上此異學說瞿曇有五法令弟子不離粗衣粗食少食粗臥具晏坐佛言不以此別有五法謂無上戒無上慧無上知見及四諦宿命漏盡七箭毛經下為此異學說天眼宿命通事彼說邪師所說上色佛展轉以螢火星月日天光等破之及為說四禪道迹八摩那修經亦為此異學破上色邪見又為說置前事後事但令正直隨化必知正法異學悟道出家九法樂比丘尼經毗舍法問尼答佛印之十大拘絺羅經舍利弗問此尊者答例品第十八一一切智經佛為波斯匿王說四姓勝如義阿難與大將論遣退天義