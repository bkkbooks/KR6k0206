front:
  text: 法輪寶懺緣起將欲建明幢以持世提快劍以祛邪必先知正法淺深方能破羣生執著南北兩藏行世已久古今書夾彼此號殊今所存明之梵夾藏其目尚嚴而不能無謬明季書本藏稱名不備續者濫登滔滔不絶直至本朝憲皇帝董而理之乃收奇黜妄整頓一新竊以二百年來國家英靈之氣感十方應化映現其間扶正醫尩抉翳破陋亦有可附之書若干矣目録之學在釋藏者以知津為近所陳要義本自可觀但記號糾紛是其所短諸家入雜門戶見存新附子目書少而例多亦不必也今依其前次融其殿軍以作水陸道場檢藏之功能姑寄懺儀備諸名相與下堂列位十方隨喜種此善根金剛不壞同治癸亥金水年月日時雞園執事咫觀記例言標目在宋未有發明義門五時言未盡善今用南北藏之舊規而稍帶知津之條例一華嚴次方等顯次方等密次般若次法華次涅槃二阿含三大乘律四小乘律五西土釋論六西土宗論七東土大乘論八小乘論九密意十新書不用雜藏呪藏等名鎔歸三藏而顯密大小東西前後綱舉目張唯重譯無奇外道論疑僞經皆當標注以示簡要今懺師等閲藏不迷也方等即方廣十二分教唯此一分不通小乘則華嚴以下一切經皆方等攝也但寶積大集為類無多可以融華嚴法華涅槃般若類多區別故別標之古德所謂獨被大機名華嚴融通空有名般若開權顯實名法華扶律談常名涅槃其不在四例者標方等之總名難越華嚴故居第二矣凡低二字皆須跪諷起立問訊此次第暫依智旭而稍改之如寶雨棱嚴是也陪正之間更當明審揭出
