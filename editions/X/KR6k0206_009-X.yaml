令自聞如是滿三十萬徧已復廣陳供養取沈水香十二指截百八護摩即見觀自在菩薩大悲聖者從東方來身衣白衣以黑絡皮作右膊交絡手持杖現行者前放大光明普照三途苦惱眾生遇斯光已身安快樂發菩提心行者凡所求願皆悉施與或飛騰虗空或安怛陀那或聞持延壽或根不具亦得圓滿欲求伏藏入修羅窟亦得隨入觀自在宮如是等一切上願世出世間無不成就以上四親近菩薩皆住女人形在徧照如來側東化隅佛眼屬地大東南隅忙麼雞屬水大西南隅白衣尊屬火大西北隅多羅屬風大四菩薩於一切成就之法皆悉能作若欲作息災法觀想梵書朗字化成佛眼菩薩相好圓滿一切莊嚴手持甘露軍持及數珠以甘露軍持灌於災障人頂如意清涼能除熱惱息一切災次作增益法觀想梵書字化成白衣菩薩身相金色以手持寶兼執蓮華降甘靈雨及雨珍寶能作最上增益之法次作敬愛法觀想梵書當字化作多羅菩薩身相赤色手持羂索及金剛鉤即以鉤索牽引令人速得敬愛次作降伏法觀想梵書𤚥字化成忙麼雞菩薩身相綠色徧體金剛光明現大忿怒相降大天火火燒彼降人身而作驚怖相如是觀法相應經剎那間所降之人可以除滅或云此多羅女相以菩薩悲念多眾生故住陀羅尼形為彼開示祕密法要以此而得名也陀羅尼襍集有觀世音與願呪有云怛枳他伽羅伐多云云非不靈異非此真呪也此所傳白衣前呪前五句歸命詞也正文唵下二十餘字耳後呪二十字更簡便此乃真正白衣呪而人不知如心經普門品不習而誦高王觀世音經同此悖謬也彼高王觀世音經所集經文呪詞皆非無本而五侯鯖襍非天厨品品八珍也凡經無譯人名者呪中夾淺俗言經中夾中國地名者佛經中兼用道教鸞教神仙名字入中者牽引大乘經附會丹法者注經不知全法藏真因者皆邪說不可信凡世所稱送子觀音像乃訶利底母形也非觀音也東南人有以現作少婦弓足盛裝為觀世音而奉之亦悖謬也若失物欲知其處燒香誦真言七徧臥去勿與人語多羅於夢中現神來告其人名形相物處然不得告人有惡人來取上誦多羅尊真言七徧遶床圍灑於四面即不能加害亦能辟蚊以多羅真言持刀杖七徧夜行宿時刀杖畫地周徧一匝一切惡獸盜賊悉不得近蛇毒人欲死取水一抄加持七徧服之即起或於傷處對誦二七徧必起頭痛以香湯洗頭加持手二十一徧捻其痛處耳痛加持油三七徧著耳中眼痛取沈水香青木香甘草等煑為湯加持三七徧洗眼心痛旦起取井華水和石鹽加持七徧服之取吐身腫加持油三七徧塗腫上患瘡加持土二十一徧和泥瘡上痢疾加持鹽水三七徧飲之不語病取狗乳加持七徧塗其口即語鼠惱人加持灰七徧遺孔前更加持水七徧瀉孔中三日作之鼠出散去絕不來狂犬傷人急誦真言七徧犬不能行更誦七徧望犬散之即解其病矣女人月水不絕日日來者加持粳米取汁和蜜誦三七徧服之兒死腹中取水著手中置少許阿魏藥加持一百八徧令服即出痔久不差胡粉一錢水銀三錢乾棗七枚去核搗為丸薄綿裹之納下部誦真言二十一徧三五度愈刀刺所傷或從高墜下痛不可忍加持淤泥七徧塗之即愈白癩黃癩或狂狗齧箭射刀傷加持泥土三七徧塗之即愈昔頗梨國有一長者家雖大富性屬鈍根師為七日依法求願則得聰明日誦千偈又有佛母守護四眾真言見孔明王經下卷十六頁一心奉請文殊師利菩薩五字真言曼荼羅法拜觀同上大士欲利益未來眾生速得成就摩訶般若自入三摩地現大神變十萬億佛一時集會同音說此真言誦此一徧如盡誦一切如來修多羅藏先兩手金剛縛豎二中指屈上節相拄如劍形真言曰阿囉跛左曩曼荼羅隨意大小中央文殊童子形如金色種種瓔珞莊嚴其身左手持金剛劍右持梵夾坐於月輪中月輪四面周旋書五字真言次畫八供養及四攝行者入壇如法念誦已當結定印諦觀菩薩演說五字真言五色光明從口而出入於行者心月之中阿字當前餘四字右繞次第而布心思其義阿字是無生義囉字是清淨無染離塵垢義跛字亦無第一義諦諸法平等義左字是諸法無有諸行義曩字諸法無有性相言說文字皆不可得義以曩字無性相故左字無諸行左字無諸行故跛字無第一義以跛字無第一義故囉字無有塵垢以囉字無塵垢故阿字法本不生阿字法本不生故曩字無有性相如是觀心本來清淨無所染著離我我所分別之相入此門者名三摩地真實修習誦一徧能除行者一切苦難兩徧除滅億劫生死重罪三徧三昧現前四徧總持不忘五徧速成無上正覺此處人不能信不知四種念誦中此為真實念誦依此字義觀想修行果能覺悟無有性相乃至法本不生則此心清淨無染離諸分別豈不能除苦滅罪速證菩提乎或謂瑜伽法品以一徧作一俱胝徧二徧作二俱胝徧則隨機所說數不同耳如是念誦滿一月已文殊現身空中說法行者即得宿命智辯才無礙自在神足勝願成就速證如來金剛法身若作印壇中央畫劍四面各於本方畫八供養契及四攝契若作三昧耶壇中書五字及八供養四攝種子字若作羯磨壇中安般若經卷對於此壇依轉字輪法念誦轉字輪法即右繞布五字種而且念且觀且思也又五髻真言十指相合而離成五峯印心兩肩喉最後頂上成五方如來此名五髻印真言曰曩謨三曼多沒駄喃一阿鉢囉二合底賀多舍娑娜喃二怛你也二合他三唵引四囉囉五三摩二合囉六阿鉢囉二合底賀多舍娑娜喃七俱摩囉路頗陀哩抳八吽九娑頗二合吒娑頗二合吒十娑嚩二合引賀引十一一心奉請金剛愛染王心真言曼拏囉法拜觀同上徧照如來於普賢滿月光明心殿中入三摩地振金剛吼音說此義利堅固愛染王真言於一切瑜加中最尊最勝能令一切見者皆生父母妻子之想亦能令持佛頂部如來部蓮華部金剛部羯磨部等真言不得成就者誦此真言三十萬徧速獲悉地以兩手內相叉為縛直豎中二指右壓左中分橫相交真言曰唵引一摩訶引囉誐二嚩日囉二合瑟抳二合沙三嚩日囉二合薩怛嚩二合四惹引五吽引六引七斛引八又一字心明二手作金剛縛豎中二指相合二頭指曲如鉤形二大指二小指豎合如五峰杵真言曰吽引一吒枳吽引二惹入音三當於白月鬼宿值日取淨白㲲畫本尊像身色如日住熾盛輪面有三目作威怒視首戴師子忿怒冠於其頂上安五鈷金剛鉤五色華髻垂覆於耳身有六臂左第一手持金剛鈴右第一手執五峰杵住金剛薩埵形次左執弓次右執箭如射天星斗光成大染法下二手右上左下執蓮華作打勢以諸華鬘絞結嚴身結加趺坐住於赤色蓮華之上蓮下畫二寶瓶吐諸寶氣像面向東行人於像前結羯磨印用二金剛拳狀如放箭誦根本明兼示三昧耶印及一字心密印惡心眾生當即斷滅又若結金剛界三十七羯磨印羯磨三昧三種印相當與金剛頂初會經及略出念誦經參互詳考及誦本業真言速能成就一切事業若作敬愛法取紅蓮華蘂百八護摩一宿即得敬愛若欲攝伏一切有情取白檀香刻作本尊形五指為量長帶於身彼皆攝伏若於飲食加持七徧能消諸毒如得甘露若七曜淩逼水火風魔頂行惡類為作障礙當畫彼形置師子口中念誦一千八遍速滅不生又或持誦行人無始世以來本有俱生障忽然現作金剛薩埵形於頂之上現一金剛輪足下現一金剛輪兩手中各現一一金剛輪又於心上現一金剛輪徧身放光照觸行人其心如醉不知所從來處即誦一字心明可除滅之持誦真言者起一散亂心此障能為便若持一字心結五峰印相出入隨於息常於自心中觀一吽字聲此障即除滅不見身與心但觀字因起等同於太空常住此等身是名微細定自性障皆滅一心奉請七俱胝佛母尊那即準提菩薩真言曼荼羅法拜觀同上世尊入等虗空大海變化神通三昧三摩地出生大準提明王說此真言能令在家出家菩薩持誦之者滅一切罪豐饒財寶生人天趣作帝王家子無有災橫病惱遇佛菩薩常得出家若出家菩薩具諸禁戒依教修行現世所求出世間悉地速得現前也二手小指無名指相叉入掌二中指直豎頭相著二頭指頭附二中指上節側二大指各附二頭指側即成妙印真言曰娜麼颯哆引喃引一三藐三勃駄引俱引胝南引二怛姪徒也反他長引三唵引四折隸五主隸六準提七娑嚩二合引訶引八畫本尊身黃白色坐蓮華上身佩圓光著輕縠衣如十波羅蜜菩薩衣上下皆作白色以綬帶繫腰朝霞絡身以白螺為手釧其臂釧七寶莊嚴一一手小指上皆著寶環頭戴寶冠身垂瓔珞有十八臂三目上二手作說法相右第二手施無畏右三手劍右四數珠五俱緣果六鉞斧七鉤八拔折羅九寶鬘左二手持如意寶幢三手蓮華四澡觀五索六輪七螺八賢瓶九般若波羅蜜經蓮華下畫水池難陀跋難陀二龍王共扶華莖左邊畫持誦人手執香爐瞻仰聖者準提佛母愍持誦人垂目顧視上畫二淨居天持鬘供養此準提法有觀二臂四臂六臂八臂十臂十二臂十八臂三十二臂八十四臂之不同瑜伽大教王經說準提二十六臂自毗盧遮那以下諸佛菩薩金剛明王等臂有多寡目亦有多寡皆從大智變化三摩地所出生故自不可泥也像成當𭘼壇中每日三時持誦結布字契二手內相叉二大指二頭指二小指相合直豎即成印相從頂至足觀一一真言字屈曲分明流出光華照諸六道輪迴苦眾生深起悲愍施與安樂用真言九字布列己身即成以如來印八大菩薩所加持身梵書唵字在頂為如來烏瑟膩沙作黃金色成無相法界以大拇指觸梵書左字在兩目成烏瑟膩沙大輪亦作金色以頭指觸梵書隸字在頸上成不動尊明王手執螺及羂索作深黑色復以大指觸梵書祖字在心成多羅菩薩身大青色現忿怒相利牙外出象皮為衣一手執劒一手執髑髏滿中盛血大拇指觸梵書隸字在兩肩成不空羂索菩薩面有三目手執蓮華羂索軍持等或作金色或作赤色以大拇指觸梵書尊字安輪中成本尊尊那菩薩身作白色而於身中能生諸佛以大拇指觸梵書禰字在兩䏶成金剛手菩薩身有圓光如日壞劫以小指觸梵字娑嚩二合安兩腨音喘足肚也成伊迦惹吒菩薩而有三頭六臂右第一手執寶杖第二手執羂索左第一手執樁誐第二手執髑髏身青色以象皮為衣以小指觸梵書訶字在兩足成嚩日囉二合曩契菩薩身色如月右二手執劍及鉞斧左二手執羂索及蓮華此菩薩是馬頭明王所化有大威力若有被德叉迦龍所蠚音螫者一切諸力無能救度唯嚩日囉二合曩契可為救度以小指觸如是結印加持其身即成金剛不壞滅一切障無量吉祥念誦數畢即結定印端身閉目澄心靜意想於胸臆間炳現圓明如滿月輪決定能證本清淨心於圓明中想梵書唵字餘八字右旋此法吳坤修所刻棱嚴呪疏本最詳於圓明上布列了了分明心不散動即與般若相應但吳刻之書是全呪文并加部林等此九字法最㨗不必泛觀全呪也少則㨗其九聖字觀中唵前左次隸右旋次祖次隸後尊次禰次娑嚩二合次訶月輪觀成思惟字義唵三生義亦是一切法本不生義左一切法不生不滅義隸一切法相無所得義祖一切法無起住義隸一切法無垢義尊又作綜一切法無等覺義禰一切法無取捨義娑嚩二合一切法平等無言說義訶一切法無因義由一切法不生故即得不生不滅由不生不滅故即得相無所得由相無所得故即得無起住由無起住故即得無垢由無垢故即得無等覺由無等覺故即得無取捨由無取捨故即得平等無言說由平等無言說故即得