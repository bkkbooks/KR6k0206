哩重呼二合四次不空成就尊於毗盧左月輪中金翅鳥王座上加趺而坐身大綠色面如滿月光明晃耀現微笑容髮髻嚴好頭冠殊妙著青色衣種種莊嚴手作施無畏印左拳覆安臍上右手大指小指相捻豎三指如旛乳旁揚掌如濟有情狀說真言曰唵引一阿慕伽悉悌二噁重呼三是五如來各住一方為五部尊主毗盧遮那入於金剛三摩地中次第出生十六大菩薩於四方如來月輪中前右左後依位而住初所出生為金剛手持五鋒杵金剛王持鉤金剛愛持弓箭金剛善哉現歡喜相善哉聲凡第四尊菩薩手中無所執此四屬阿閦壇次所出生為金剛藏執摩牟寶金剛光執日輪相金剛幢執幢金剛笑現微笑相此四屬寶生壇次所出生為金剛法執蓮華金剛利執劍金剛因執輪金剛語現念誦相此四屬觀自在王壇次所出生為金剛業執羯磨杵形如十字皆有鋒刃金剛護被甲冑金剛藥叉執牙器仗金剛拳現金剛縛相此四屬不空成就壇一一出生皆先入一切如來十六大菩薩三昧說真言已即成杵鉤弓箭等幖幟還入毗盧遮那心隨住掌中於一一幖幟中現種種神變遊戲事業十六菩薩即普賢不空王摩囉極喜王虗空藏大威光寶幢常歡喜根觀自在妙吉祥轉法輪無言巧業難敵精進摧諸魔拳妙縛是諸菩薩各有理性所說十六真言謂嚩日囉薩埵囉惹囉誐娑度嚩日囉囉怛那帝惹計都賀娑嚩日囉達摩底乞叉拏呬覩婆沙嚩日囉羯摩犖叉藥叉散地此等自語言印皆從金剛界門生彼諸菩薩理性於金剛薩埵三摩地堅牢妙合從是出金剛手等十六大士身從毗盧遮那世尊心下於四如來月輪中住然後授與金剛杵等幖幟復為立名各各冠以金剛之號爾時十六大士手持幖幟於一切如來前作諸事業此為出生十六大菩薩法而彼四如來一一各入三昧出生金剛波羅蜜寶波羅蜜法波羅蜜業波羅蜜四菩薩於中方毗盧月輪中住真言印契同四如來此為出生四波羅蜜菩薩法次毗盧遮那如來為供養四如來故出生金剛嬉戲金剛鬟金剛歌金剛舞天女於內四隅月輪中住是謂內供養次四如來為奉答毗盧遮那供養事故出生金剛香金剛華金剛燈金剛塗香天女於外四隅月輪中住是為外供養最後毗盧遮那如來出生金剛鉤金剛索金剛鎖金剛鈴使者於四門月輪中住是謂四攝使者如上三十七尊皆從毗盧身中出現若有持誦五如來真言者當依法畫金剛界大曼荼囉及𭘼像先安住三昧已發大菩提心然後入於壇中身對像前洗除心垢誦淨三業真言一剎那中心垢清淨以真言威力開發菩提心觀一切法如幻如化本自性空無有堅實依此菩提心想為月輪於月輪上想有梵書唵字為身金剛次想梵書阿字成語金剛次想梵書吽字成心金剛如是三字成金剛身語心已想梵書鉢囉二合字化成蓮華乘此蓮華相好具足想自身作貢高勢即是金剛界如來一切莊嚴圓光照耀如是本身即是畢竟菩提大智復想諸佛徧滿虗空作大神變此五如來演暢瑜伽真理四諦六度諸波羅蜜等作大利益救濟眾生復想諸佛各坐蓮華諸相圓滿一切莊嚴而彼華座相合為一此則佛身一多無二理事無礙法界同體然後依法獻八供養戲鬘歌舞香華燈塗當即持誦正定身心離諸散亂不緩不急文句周正如是依法觀想持誦如天滿月無有虧盈不久之間證大菩提次當說其功能由結大智拳契誦毗盧遮那如來真言即得金剛三業平等光明大菩提成就三身堅固不壞由結觸地契誦阿閦如來真言即得身心不動現證三昧成就十方世界一切金剛供養事業由結施願契誦寶生如來真言即得出現寶幢攝受眾生無所住相成就菩提法無我智由結三摩地契誦觀自在王如來真言即得金剛壽命平等光明為諸眾生說大乘法由結施無畏契誦不空成就如來真言即得金剛不空平等光明出生吉祥智海利益眾生離諸怖畏一心奉請金剛手薩埵菩薩曼荼羅法拜觀同上此菩薩為密部如來之長子故特先之毗盧遮那如來於金剛界大曼荼囉入一切如來普賢三昧出生薩埵大月輪也即圓滿菩提心相於薩埵月輪中出現五峯光明金剛杵相住佛掌中作神變已以金剛性與金剛薩埵三摩地妙相合故首遂出出金剛手大菩薩身受職立名如前所說為一切如來長子是一切如來菩提心受一切如來教勅於秘密法中為增上主宰而是菩薩現高舉相金剛慢自在勢以二手結金剛拳左手置於胯下右手戲擲金剛杵安自心間作勇進勢此為大印說真言曰唵引一嚩日囉二合薩怛縛二合二惡三又根本真言結大智印唵引一摩訶素上佉嚩日羅二合薩怛嚩二合二弱吽斛三素囉多薩怛三合四夫修菩薩行證妙菩提利益有情方諧本願有情沈沒甚深甚深若不入五部五蜜曼拏囉不受三種秘密加持自有漏三業身何能度彼乎彼有情類上二界空界色界定地所攝欲界無禪是散善地設欲修定仍先假頭陀依七方便五停心總相念別相念煖地頂地忍地世第一地由根羸劣無學緣覺果尚自難成何況法雲大普賢地及毗盧三身普光明地二乘之人雖證道果不能利益無邊有情於顯教修行久經三大阿僧祇然後證成無上於其中間十進九退或證七地以所集福德智慧迴向聲聞緣覺道果仍不能證無上正等菩提密教聽毗盧遮那自受用身所說內證自覺聖智法及大普賢金剛薩埵地受用身智則於現身得入曼荼羅為具足羯磨以普賢三摩地引發金剛薩埵入其身內由加持威德力故於須臾頃當證無量三昧耶無量陀羅尼門以不思議法能變易俱生我執法執種子應時集得身中一大阿僧祇劫所集福德智慧則為生在佛家從一切如來心生從佛口生得佛法財指三密菩提心教法若才見曼荼羅能須臾頃生於淨信以歡喜心瞻覩則於阿類耶識中種金剛界種子