誦七徧後誦正呪手印皆未聞南謨薜室囉末拏引也南無檀那也檀泥說囉引也阿揭撦阿鉢利弭多檀泥說囉鉢囉麼迦留尼迦薩婆薩埵呬哆振哆麼麼己名檀那末奴鉢喇拽撦碎閻摩揭撦莎訶此誦七徧然後稱名敬禮三寶及薜室囉末拏大王能施財物令諸眾生所求願滿悉能成就與其安樂如是禮已次誦如意末尼寶心神呪呪曰南謨曷喇怛娜怛喇夜引也南謨薜室囉末拏引也莫訶囉闍引也怛姪他四弭四弭蘇母蘇母旃荼旃荼折囉折囉薩囉薩囉羯囉羯囉枳哩枳哩矩嚕矩嚕母嚕母嚕母嚕主嚕娑大也頞貪我名某甲昵店頞他達達覩莎訶南謨薜室囉末拏也莎訶檀那駄也莎訶曼奴喇他鉢利脯囉迦引也莎訶先誦此千徧然後於淨室中瞿摩塗地作小壇場隨時飲食一心供養常然妙香令煙不絕誦前心呪晝夜繫心唯自耳聞勿令他解時北天王子名禪膩師現童子形來至其所問言何故須喚我父即可報言供養三寶事須財物願當施與北天王子還白其父父王報曰汝可日日與之一百迦利沙波拏金錢也持呪者見此相已知事得成當須獨處淨室燒香而臥可於床邊置一香篋每至天曉觀其篋中獲所求物每得物時當日即須供養三寶香華飲食兼施貧乏悉令罄盡不得停留於諸有情起慈悲念勿生瞋誑諂害之心若起瞋者即失神驗又當每日憶我多聞天王及男女眷屬稱揚讚歎恒以十善共相資助令彼天等福力增明眾善普臻證菩提處天眾歡喜共來擁護持呪之人壽命無量永離三塗常無災厄亦能獲得如意寶珠及諸伏藏神通自在所願皆成乃至官榮無不稱意亦解一切禽獸之語此後仍有現身共語法今未錄一心奉請無染著陀羅尼曼荼羅法拜觀同上一心奉請佛說如意寶珠陀羅尼觀自在菩薩金剛秘密主菩薩所說如意寶珠陀羅尼索訶世界主梵天王帝釋天王護世四天王所說如意寶珠陀羅尼諸大龍王所說如意寶珠陀羅尼曼荼羅法拜觀同上金光最勝一切呪皆趣如意寶珠孔經一切呪趣大孔明王真言而以金曜所持北天所說為之主故詳敘之而略其餘一心奉請堅牢地神請召陀羅尼現身陀羅尼護地陀羅尼曼荼羅法拜觀同上地神言我有心呪能利人天安樂一切若有欲見我真身者當至心誦隨其所願皆悉遂心所謂資財珍寶伏藏及求神通長年妙藥并療眾病降伏怨敵制諸異論當於淨室安置道場沐浴身已著鮮潔衣踞草座上於有舍利尊像之前及有舍利制底之所制底塔也燒香散華飲食供養若無舍利即供此金光明最勝王經用作如來真身於白月八日布灑星合即可誦此請召之呪手印未聞呪曰怛姪他只哩只哩主嚕主嚕句嚕句嚕拘柱拘柱覩柱覩柱嚩訶嚩訶伐捨伐捨莎訶誦一百八請召地神即來赴請若欲現身共語再誦後呪呪曰怛姪他頞折泥頡力剎泥室尸達哩訶訶呬呬區嚕伐曬莎訶誦此百八并誦前呪必來現身隨其所願皆得成就若欲誦此呪時先誦護身呪呪曰怛姪他你室哩末捨羯捺矩勃地上勃地曬底婢㨖矩句㨖佉婆上只哩莎訶誦此呪時五色線作結二十一徧二十一結繫在左臂肘後即便護身無有所懼一心奉請僧慎爾耶藥叉大將陀羅尼曼荼羅法拜觀同上南謨佛陀引耶南謨達磨引耶南無僧伽引耶南謨跛囉蚶摩耶南謨因達囉耶南謨折咄喃莫喝囉闍喃怛姪他呬哩呬哩弭哩弭哩瞿哩莫訶瞿哩健陀里莫訶健陀里達羅弭雉莫訶達羅弭雉單荼曲勸第訶訶訶訶訶呬呬呬呬呬呼呼呼呼呼漢魯曇謎瞿曇謎者者者者只只只只主主主主旃荼攝鉢囉尸揭囉尸揭囉嗢底瑟侘呬薄伽梵僧慎爾耶莎訶能持呪者天將給與資生樂具衣服飲食華果珍異或求男女童男童女金銀珍寶諸瓔珞具皆能供給此呪有大神力若誦呪時天將速至其所令無障礙隨意成就先畫僧慎爾耶藥叉形像高四五尺手執鉾鑹於此像前作四方壇安四滿瓶蜜水或沙糖水塗香末香燒香及諸華鬘又於壇前作也火爐中安炭火以蘇摩芥子燒於爐中口誦前呪一百八徧一徧一燒乃至僧慎爾耶藥叉大將自來現身問其所求皆令滿足金銀伏藏神仙天眼他心皆能得也此壬字集仍須將梵字形音補刻於後因工促促未得從容或補後集後或雲來集中并加增大曼拏囉相佛眼尊曼陀囉相多羅布字式準提布字式五字輪金剛符印等行持要法雲來集詳之後之所補號號相銜觀者必求其備須廣徵文獻一心奉請阿彌陀佛淨土門中鼓音聲王陀羅尼曼荼羅法拜觀同上此密淨兩門相通之妙用世但知往生呪耳呪曰多你他一婆離二阿婆離三娑摩婆羅四尼地奢五昵闍多禰六昵茂邸七昵茂企八闍羅婆羅車䭾禰九宿佉波啼昵地奢十阿彌多由婆離十一阿彌多蛇十二娑羅婆陀彌十三涅浮提十四阿迦舍昵浮陀十五阿迦舍利提奢十六阿迦舍昵闍啼十七阿迦舍離十八阿迦舍達奢尼十九阿迦舍提他禰二十留波昵提奢二十一遮埵唎達摩波羅娑陀禰二十二遮埵唎阿利蛇娑帝蛇波羅娑陀禰二十三遮埵唎末伽婆那波羅娑陀禰二十四波羅毗梨耶波羅娑陀禰二十五達摩呻他禰二十六久舍離二十七久舍羅昵提奢二十八久舍羅波羅啼他禰二十九佛陀久舍離三十毗佛陀波羅波斯三十一達摩迦羅禰三十二昵專啼三十三昵浮提三十四毗摩離三十五毗羅闍三十六羅闍三十七羅斯三十八羅娑正三十九羅娑伽羅娑羅四十羅娑伽羅阿地他禰四十一久舍離四十二波羅啼久舍離四十三毗久舍離四十四他啼四十五修陀多至啼四十六修波羅奢多至啼四十七修波羅啼癡啼四十八修離四十九修目企五十達咩五十一達達咩五十二離婆五十三遮婆離五十四阿㝹舍婆離五十五佛陀迦舍昵求禰五十六佛陀迦舍求禰五十七娑婆訶五十八
