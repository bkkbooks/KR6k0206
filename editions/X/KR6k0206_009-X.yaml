body:
  text: 今於本朝工布查所譯造像量度經之後東土撰述之前取密宗所有一一曼荅囉之法分條頂禮以暢瑜伽之旨水陸儀軌本屬瑜伽用呪十餘皆有觀想而唯存一禪定手印今之通論亦未強增但真言宗全具三密諸道場不用曼荼囉法結界三業或偏重一二若依法結界則三密森嚴一無可懈如瑜伽𦦨口集要之類是也此曼荅囉有能入者得密部威神能普入一切曼荅囉者威神具足今此壬字集更分五部一佛部二金剛部三蓮華部四寶部五羯磨部佛部亦名灌頂部蓮華部亦名法部金剛部亦名僧部佛部中又分出佛頂部佛部前或又開瑜伽部蓮華部中或又分觀音部文殊部五部應五方一方全具五也一心奉請瑜伽十八會經中所說一切曼荼囉拜觀同上瑜伽十八會經皆毗盧遮那佛所說金剛手菩薩親於佛前受最上義後數百年傳於龍猛龍猛又數百年傳於龍智龍智傳金剛智挑其梵冊東行翻譯流布為此土初祖適當唐開元時金剛智得不空為二祖不空傳慧朗宋時施護法堅猶傳其法元明絕響日本國每有密宗門庭日本佛法不純全而亦頗有識力具足者中土希音令人惆悵也夫一切法以成就為準非密力化現則世相何所依而出世之相何從開而世出世不思性相用何由圓密力之精即第一義密力之流露即修多羅密力之循序布施即五部三壇真言手印觀想也今欲於水陸道場啟建虗空樓閣招凡引聖大慰於心匪由密力何克成就或云顯密二教密教先亡性相二宗相宗早絕此二門觀行識相極其微細靈根不具領會全鬆望卵求時增愚益妄達人其何日逢也一心奉請法身曼荼囉拜觀同上勝義修行建立法身曼荼嚩即毗盧遮那成道經所云先絣虗空中曼荼囉也觀本尊法身遠離形色猶如虗空住如是三摩地一心奉請四輪曼荼囉拜觀同上本尊聖者若黃色住地輪曼荼囉其形方名金輪本尊聖者若白色住水輪曼荼囉其形圓本尊聖者若赤色住火輪曼荼囉其形三角本尊聖者若青色若黑色住風輪曼荼囉其形半月一心奉請曼荼囉三部心真言拜觀同上爾那羅阿嚧力嚩日囉地力一心奉請曼荼囉中三部主拜觀同上金輪佛頂佛部主馬頭觀自在蓮華部主三世勝金剛金剛部主一心奉請曼荼囉中三種部母拜觀同上佛部以佛眼為部母蓮華部以白衣觀自在為部母金剛部以忙麼鷄菩薩為部母一心奉請曼荼囉中三種明妃拜觀同上佛部無能勝菩薩以為明妃蓮華部多羅菩薩以為明妃金剛部孫那利菩薩以為明妃一心奉請曼荼囉中忿怒尊拜觀同上不動尊佛部忿怒也忿怒鉤蓮華部忿怒也軍荼利金剛部忿怒也一心奉請曼荼囉四種界拜觀同上一金剛橛地界二金剛牆八方界三金剛綱上方界四火院界一心奉請曼荼囉四種護拜觀同上金剛索護東方金剛幢旛護西方金剛迦利護南方金剛峯護北方一心奉請大界商羯囉拜觀同上一字頂輪王真言若有誦者五由旬內一切真言神不現威德不與悉地以一字頂輪威德殊絕故若結此商羯囉大界則一字真言不為障礙也商羯囉大界指三十七聖曼拏囉也一心奉請一切息災曼荼囉拜觀同上世間悉地有四種第一息灾次增益次敬愛次降伏息灾者宜月生一日至八日增益宜九日至十五日敬愛宜十六至二十三日降伏宜二十四至月盡日一之亥起至八仍是七日也小建則二十三起作息灾法者面向北像面向南交脛豎膝吉祥而坐於本尊前塗飾圓壇本尊隨真言而現固不能一定今略標尊那一法餘聖可例推觀本尊作白色所獻華果飲食并自身衣服皆作白色塗香用白檀燒香用沈水點酥燈以慈悲眼分明稱誦不緩不急與慈心相應慈悲眼者堅固如山其睛不眴從月一日初時起首至八日一期每日三時澡浴三時換衣至日滿日或斷食或三白食三白食謂粳米及乳酪也如是念誦則能息灾除難獲得吉祥一心奉請一心增益曼荼囉拜觀同上若作增益法者面向東像面向西結蓮華座加趺而坐本尊前塗拭方壇觀本尊作黃色所獻華果飲食并自身衣服等皆作黃色塗香用白檀加少金燒白檀香然油麻油燈以金剛眼顧視金剛眼者秉愛重之心現歡悅之眼也金剛語言而為念誦與喜悅心相應從月九日日出時起首至十五日一期滿準前三時澡浴三時換衣至日滿時準前斷食及三白食如是念誦能增福德及諸勝事一心奉請一切敬愛曼荼囉拜觀同上若作敬愛法者面向西像面向東豎膝竝脚臀不著地為賢坐本尊前塗蓮華形壇觀本尊作赤色身著緋衣所獻華果飲食等盡皆赤色塗香用金燒香用丁香蘇合香和蜜燒之然諸果油燈即以明目而攝服之明目者踴動速瞬眼𥇒是也稱誦緊捷與喜怒心相應從十六日後夜時起首後夜時日之丑寅時也至二十三日至丑寅滿一期滿至日滿時澡浴食法悉準前如是念誦則能鉤召若男若女調伏鬼神怨敵皆令迴心歡喜敬愛於我一心奉請一切降伏曼荼囉拜觀同上若作降伏者面向南像面向北右脚正立斜引左脚如楷書丁字曲身倚立本尊前塗三角壇觀本尊作青色或黑色身著青衣獻青色華臰華不香華及曼陀羅華等飲食用石榴汁染作黑色或作青色塗香用柏木閼伽用牛尿以黑色華及芥子柏木塗香等各取少分置閼伽中燒安息香然芥子油以瞋恨眼作色威怒分明誦之與忿怒心相應瞋恨眼者舉眉斜目齒齩上脣也從二十四日午時或中夜時起首中夜即二十四日子正也子初仍屬前一日至月盡日一期圓滿滿日澡浴食法如前如是念誦則能降伏毒龍惡獸毀滅佛性邪見惡人違背君主如是等類作此法時彼等必有覺觸身心不安或病或至不濟即勸彼令發善心悔過自責為作息災法即得如故一心奉請曼荼囉中四種念誦拜觀同上一音聲念誦一切聲是也二金剛念誦合口動舌默誦是也三三摩地念誦心念是也四真實念誦如字義修行是也一心奉請四種曼荼囉中各別音聲拜觀同上息灾念聲軌式清和調勻聲靜自知句末寂靜和聲婆嚩二合訶字增益念聲軌式不大不小調喋捷利句末喜利緊稱吽字若攝召敬愛念聲軌式緊捷旋利聲固外聞句末震肅喜怒二稱弱字若降伏法念聲軌式忿怒瞋謑挫颲訶黜聲畏遠聞句末倍加奮怒謑聲吽泮吒半音字謑恥辱也一心奉請曼荼囉中成就金剛杵拜觀同上蘇婆呼童子經中說不持金剛杵無由得成就金剛杵者菩提心義能斷壞二邊契於中道中有十六大菩薩位亦表十六空為中道兩邊各有五股五佛五智義亦表十波羅蜜能摧十種煩惱成十種真如便登十地證金剛三業獲金剛智坐金剛者亦是一切智智亦名如來自覺聖智若不修此三摩地得成佛者無有是處一心奉請曼荼囉中五部真言拜觀同上吽怛囕二合紇哩二合噁一心奉請曼荼囉中五佛身光字種拜觀同上唵白色毗盧遮那佛身光也吽青色阿閦佛身光也惹黃金色寶生佛身光也護黃色阿彌陀佛身光也婆具五色不空成就佛身光也一心奉請曼荼囉中五根本真言拜觀同上徧照如本根本真言曰唵阿阿閦如來根本真言曰唵吽寶生如來根本真言曰唵怛囕二合阿彌彼如來根本真言曰唵𠶹哩二合不空如來根本真言曰唵吭一心奉請一切法門二種曼荼囉拜觀同上一畫像壇二作法壇一心奉請三種曼荼囉拜觀同上一手印壇二呪語壇三心想壇也又一上師三寶壇二顯密護神壇三六道有情壇一心奉請曼荼囉行法二利三心拜觀同上直心通利自他上也深心自利中也悲心利他下也一心奉請曼荼囉中歸依發心受戒三真言拜觀同上歸依用唵婆龕發菩提心用唵補提即答沒怛巴達野彌授三昧耶戒用唵三昧耶薩埵一心奉請入曼荼囉初方便囉字真言拜觀同上凡梵字有眾形同音眾音同形小異大同異同同異此書未能多列擬補刻梵字音形質疑以便檢閱今殊不及也初觀囉字從心中飛出現於對面先青後紅上騰虗空化作三尖火輪燒自身心從頂至踵淨無有餘一心奉請入曼荼囉初方便阿字真言拜觀同上次觀於虗空月輪中出現一白色阿字生成己身百體既圓根塵竝妙一心奉請入曼荼囉初方便吽字真言拜觀同上次觀虗空中自然而有金色吽字流注光明灌於頂門十字縫中而成聖體一心奉請入曼荼囉金剛杵觀拜觀同上前云金剛杵即菩提心義謂能斷壞二邊契於中道而望卵求時之輩不由道路自取金剛穢迹一呪而煉之乃著於有矣凡密部所行不著於有無二邊方成金剛寶用乃至邪不著正亦不著魔不著佛亦不著故用穢物現瞋相行慢法或一時能成就聖用而不妨一涉惡情悰則不堪涉想矣其寶杵之名杵之相杵之妄想杵之如如杵之正智噫又觀頸上出一蓮華華中現一梵書阿字此壬字集中所云字皆直指梵書後不注可例推也阿字化為月輪月輪復化吽字吽字化為五股金剛落於舌上成金剛舌又觀兩手間出一阿字阿字化為月輪月輪復化吽字吽字化為白色五股金剛杵落於手中成金剛手一心奉請曼荼囉金剛三印拜觀同上先以兩手各將大指第一母指二指為頭指三為中指四為無名指五為小指捻名指即無名指根將餘指緊握作拳名金剛拳又以兩手十指相叉指露於外而緊握此名外相叉若指全不露名內相叉名金剛縛又以此金剛縛翻轉手掌向上名金剛掌此三印乃一切印之所從出生也一心奉請入曼荼囉急方便金輪大菩薩真言拜觀同上古師因後人慧淺心疎不能受持廣大儀軌略其重疊存其要領無論三壇五部一切真言壇可皆通用教中明言一切真言手印皆從師受未入灌頂輪壇輙結手印作法得盜法罪所作不成若於如來像前誦金剛輪大菩薩真言二十一徧即如見佛即當入一切曼荼囉所求諸法皆得成就此之印相以二手內相叉二頭指竝伸直二中指纏頭指初節前各以峯相拄二大指竝伸直當心真言曰曩莫悉底哩野四合地尾二合迦引南引一薩嚩怛他引誐跢引喃引二闇三尾囉𠰒尾囉𠰒四摩訶作羯囉二合嚩日哩二合五娑跢娑跢六娑囉帝娑囉帝七怛囉二合以怛囉二合以八尾默麼你九三畔惹你十怛囉二合麼底十一悉䭾引儗俚二合十二怛囕二合引娑嚩二合引賀引十三一心奉請入曼荼囉次第方便觀法真言手印拜觀同上入壇禮佛先誦淨法界真言二十一徧想臍輪中出一囉字發智慧火燒除浮念妄想并所觸垢污不沐成浴心等虗空與清淨法界理事相應此須與前囉字真言條參觀竝用乃移神換剎之妙機也以二手作金剛拳置於䏶上為手印真言曰唵引一囕二娑嚩二合引賀引三次誦護身真言或直依此用或兼用阿字真言條亦可二十一徧既護自身亦護他人仍用金剛拳為印真言曰唵引一齒臨離禁切二合二次結三部心印及誦真言加持三業佛部心印二手右壓左內相叉為拳二大指竝豎勿使頭屈默誦三遍呪頂上散印凡印皆宜頂上散之真言曰唵引一爾惹以反曩𡁠翼二合迦半音二由此真言印加持故一切如來普皆雲集能令行者身業清淨次結蓮華部心印仍以右壓左以右手大指入於左手大指頭指間為右壓左內相叉為拳復以左大指入掌握右頭指頭而使右大指直豎為印真言曰唵引一阿去引嚕轉舌呼力迦半音二由此真言印加持故一切蓮華部族諸大菩薩普皆雲集能令行者口業清淨次結金剛部心印仍以右壓左內相叉為拳復屈右大指入掌握左頭指頭左大指直豎為印真言曰唵引一嚩日囉二合引地力二合迦半音二由此真言印加持故一切金剛部族諸大菩薩普皆雲集能令行者意業清淨次結迎請眾聖印二手仰相叉以二頭指頭相拄