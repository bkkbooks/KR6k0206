body:
  text: 一心奉請佛說梵網經拜觀同上姚秦天竺沙門鳩摩羅什譯但有菩薩心地一品分上下佛於第四禪接眾歸蓮華藏盧舍那佛於千華座上先說三十心十地次說十重四十八輕菩薩戒令化身釋迦轉教眾生行菩薩道入如來地大乘律部本與諸經襍見不必定如小乘分兩藏也然說律義多者入律部一心奉請菩薩瓔珞本業經拜觀同上姚秦涼州沙門竺法念譯集眾品第一佛重遊道樹下放四十二光集十首菩薩從十林剎十精進佛所來并集十切諸天眾等賢聖名字品第二說十住十行十回向十地等覺妙覺名字皆華梵雙舉又說住前十心信念進定慧戒迴向護法捨願又說二十四願偈十不可悔戒賢聖學觀品第三謂十住名習種性十行名性種性十向名道種性十地名聖種性次等覺性次妙覺性又名六堅又名六忍又名六慧又名六定又名六觀又名六寶瓔珞謂銅寶銀寶金寶瑠璃寶摩尼寶水晶寶并說六位所修說行譯義品第四釋前十信及四十二位之義佛母名品第五答敬首菩薩問二諦義并說小中大劫差別因果品第六明十波羅蜜各有三緣又說七財四攝四辯四依等為因二種法身為果大眾受學品第七佛復放光集眾囑文殊及善財七大菩薩各領大眾受學因分別三種受戒及受戒儀式由受戒故次第入於住行向地等妙覺中集散品第八三勸大眾發菩提心乃至再囑須受菩薩戒已方可為說此大法門天台判別圓位次一心奉請菩薩善戒經拜觀同上劉宋中天竺沙門求那䟦摩等譯一名菩薩地序品第一與寶積中決定毗尼經同善行性品第二發菩提心品第三利益內外品第四真實義品第五不可思議品第六調伏品第七菩提品第八菩提力性品第九施品第十戒品第十一忍品第十二精進品第十三禪品第十四慧品第十五輭語品第十六供養三寶品第十七三十七功道品第十八助菩提數法餘品第十九功德品第二十如法住菩薩相品二十一如法住禪品二十二如法住定心品二十三如法住生菩薩地品二十四如法住畢竟地生品又第一畢竟地攝取品又第二畢竟地畢竟品三畢竟行品四畢竟地三十二相八十種好品五畢竟地住品六明十力四無畏等後有優波離問結經名從第二品以下並與瑜伽師地論中菩薩地同意彌勒菩薩宗此經成地論而地持一經又從地論錄出別行故仍與此大同也一心奉請菩薩善戒經拜觀同上明六重八重及四十八輕即上經戒品中別出與菩薩戒本及羯磨文大同小異優波離明菩薩受戒法一心奉請佛說受十善戒經拜觀同上開元錄拾遺單本十惡業品第一佛為舍利弗說十惡業名并示以授十善戒法身三口四意三三番歸依而受次受八戒齋法十施報品第二歎頌不殺功德次說殺生十報略歎不盜功德次說偷盜十報讚歎不婬有五功德次說婬有十過頌讚不妄語等功德說四過惡業一心奉請佛說十善業道經及佛說娑伽羅龍王所說大乘法經拜觀同上唐于闐國沙門實叉難陀譯第二宋北印土沙門施護譯即方等部海龍王經中一品第二同一心奉請文殊師利問經拜觀同上蕭梁扶南國沙門僧伽婆羅譯序品第一佛住耆闍崛山與比丘菩薩眾俱菩薩戒品第二與沙彌十戒同不可思議品第三明如來不入涅槃無我品第四涅槃品第五般若波羅蜜品第六有餘氣品第七來去品第八中道品第九世間戒品第十亦即沙彌十戒出世間戒品第十一明菩薩七聚上出世間戒品第十二觀第一義也菩薩受戒品第十三發菩提心也字母品第十四分別部品第十五明佛滅後僧祇上座二部共出二十部皆是大乘出無是亦無非襍問品第十六設為外道種種邪難求佛解釋囑累品第十七既囑累已復廣明在家過患出家功德次明念佛三昧得見餘世界佛次明用供養華呪法一心奉請佛說菩薩內戒經拜觀同上劉宋中天竺沙門求那䟦摩譯佛以十五日說戒時文殊請問初發意道俗菩薩當作何功德佛為說十二時戒法一歸依懺悔誓行六度發三願及行十法則二受四十七戒三受佛法身般若各二十因緣四受二十因緣行之自知宿命五受四禪法六受般若三昧法七受菩薩三昧法八受月三昧平心行之九六根去惡為善以六度教化一切十外如地內如水十一願一切眾生各得其樂十二修六妙門不住三乘果次說十住菩薩各有十功德一心奉請佛藏經拜觀同上姚秦天竺沙門鳩摩羅什譯諸法實相品第一為舍利弗說十空等十喻言如來說一切法無生滅念佛品第二無有分別無取無捨是真念佛念法品第三念僧品第四淨戒品第五明破戒比丘成就十憂惱箭必墮惡道淨法品第六明迦葉佛預記釋迦佛法中多受供養故法當疾滅如諸盲為賊所誑墮於深坑往古品第七明大莊嚴王滅後眾分五部一解正法者即今滿慈子四說邪法者久墮地獄今出為調達等淨見品第八明釋迦曾於過去歷侍多佛以有所得故不獲受記至定光佛時悟無生忍乃得受記了戒品第九明三種人不喜聞此經一破戒二增上慢三不淨說法及貪著我者次明白毫相光一分能供如法修道比丘不必愁慮四事但一心辦道囑累品第十具明末世不如法事并囑累竟魔王憂惱啼哭以佛預為之防不能破正法故一心奉請優婆塞戒經拜觀同上北涼中天竺沙門曇無讖譯集會品第一善生長者述外道禮六方法佛告以六度示一切法無性發菩提心持八重六重名在家出家菩薩發菩提心品第二悲品第三解脫品第四三種菩提品第五謂聲聞緣覺佛菩提也亦云從聞思修得修三十二相業品第六發願品第七名義菩薩品第八義菩薩心堅固品第九自利利他品第十自他莊嚴品第十一二莊嚴品第十二謂福慧攝取品第十三受戒品第十四明在家六重二十八戒須六月中淨四威儀乃於二十僧中授之淨戒品第十五明受戒後種種法要三法四法等息惡品第十六供養三寶品第十七六波羅蜜品第十八襍品第十九明布施如法不如法清淨不清淨淨三歸品第二十八戒齋品第二十一五戒品第二十二尸波羅蜜品第二十三業品第二十四即十業十惡羼提波羅蜜品第二十五毗離耶波羅蜜品第二十六禪波羅蜜品第二十七般若波羅蜜品第二十八一心奉請佛說法律三昧經拜觀同上吳月支國優婆塞支謙譯佛於摩竭提國先說十二自燒次為阿難說雖發大意有四墮落次因舍利弗自責昔非為說大乘法要次為勇聲菩薩分別聲聞禪緣覺禪如來禪五通仙人禪之不同一心奉請清淨毗尼方廣經及佛說文殊師利淨律經寂調音所問經拜觀同上姚秦天竺沙門鳩摩羅什譯第二竺法護譯第三劉宋沙門釋法海譯佛在耆闍崛山寂調伏音天子思見文殊佛放白毫藏光從寶相佛國召來與十千菩薩俱文殊與天子問答第一義諦及彼土聲聞所證大法有四眾各五百人及五千天子因欲往彼土作聲聞眾而發大心得往生記又問答聲聞菩薩律行不同及種種法門因明住五無間成無上道謂從初發意中間大心大慈悲大捨分證滿證皆悉無間直至成佛又總約大悲別約六度明煩惱成菩提義佛讚印解迦葉疑文殊以神力教示彼土菩薩於此土眾生而發大願第二同而分四品五無間諸文缺天子名寂順律音第三同於第二亦名如來所說清淨調伏經一心奉請佛說文殊悔過經拜觀同上西晉月支國沙門竺法護譯佛在靈山新學菩薩有疑如來齊光照耀菩薩為之請問文殊文殊為說懺悔勸助請法興供迴向發願眾得無生忍佛遙聞而讚歎之勸助隨喜也一心奉請三曼陀陀羅菩薩經拜觀同上西晉清信士聶道真譯序品第一佛在摩提國文殊問三曼陀陀羅菩薩若人求菩薩道者當作何施行先總答之悔過品第二願樂品第三即隨喜請勸品第四法行品第五即迴向譬福品第六一心奉請菩薩藏經及舍利弗悔過經大乘三聚懺悔經拜觀同上蕭梁扶南國沙門僧伽婆羅譯第二安世高譯第三闍那崛多及笈多等譯佛在祇園舍利弗問懺悔隨喜勸請迴向之法佛具答之初明十世界十佛令結壇受持後明後去大光明聚如來時佛為竭伽陀天女受持此經即轉女身若女人聞此如來名者即不更受女身二三同而文略一心奉請佛說淨業障經拜觀同上開元附秦錄佛住毗舍離菴羅樹園無垢光比丘入城乞食被婬女所呪犯根本戒生大憂悔見文殊遂見佛佛為說無性之法發心得記因廣說淨業障法說過去無垢光佛滅後有勇施比丘犯根本戒得聞深法遂發大心今已成佛一心奉請佛說善恭敬經及佛說正恭敬經拜觀同上隋北天竺沙門闍那崛多譯第二元魏北天竺沙門佛陀扇多譯說教他功德及事師軌式第二唯事師軌式一心奉請佛說大乘戒經拜觀同上宋北印土沙門施護譯佛在祗園說文簡義切最宜流通一心奉請菩薩戒羯磨文拜觀同上彌勒菩薩說唐大慈恩寺沙門釋玄奘譯出瑜伽師地論受戒羯磨第一懺悔羯磨第二得捨差別第三一心奉請菩薩戒本經及菩薩優婆塞五戒威儀經菩薩戒本拜觀同上慈氏說北涼中天竺沙門曇無讖譯第二求那䟦摩譯第三玄奘譯此亦半月半月誦戒本與梵網相輔而行第二附禮佛發願受繩牀等法第三增入開性罪八條一心奉請菩薩受齋經拜觀同上西晉清信士聶道真譯先明三歸悔過次護十念次十戒次解齋法迴向淨土一心奉請菩薩五法懺悔經拜觀同上開元附梁錄五悔各作偈語無序分無流通分以上大乘律
