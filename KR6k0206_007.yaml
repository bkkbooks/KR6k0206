body:
  text: 一心奉請肇論拜觀同上姚秦長安沙門釋僧肇著宗本義物不遷論不真空論般若無知論涅槃無名論附上奏秦王表九折十演一心奉請晉僧肇法師法寶藏論拜觀同上僧肇著廣照空有品離微體淨品本際虗無品一心奉請大乘止觀法門拜觀同上陳南嶽思大禪師曲示心要先示大乘止觀次作五番建立第一明止觀所依第二明止觀境界第三明止觀體狀第四明止觀斷得第五明止觀作用後更示念佛止觀食時止觀大小便利時止觀一心奉請法華經安樂行義拜觀同上陳南嶽思大禪師撰明一切新學菩薩欲求大乘超過一切諸菩薩疾成佛道須修施戒忍進禪專意法華三昧觀一切衆生皆如佛想偈云菩薩學法華具足二種行一者無相行二者有相行無相四安樂甚深妙禪定觀察六情根諸法本來淨衆生性無垢無本亦無淨不修對治行自然超衆聖無師自然覺不由次第行釋云無相行者一切諸法中心相寂滅畢竟不生行住坐臥飲食語言一切威儀心常定故諸餘禪定三界次第從欲界地未到地初禪地乃至非非想處地有十一種差別不同有法無法二道為別是阿毗曇雜心聖行若安樂行中深妙禪定即不如此不依止欲界不住色無色行如是禪定是菩薩遍行畢竟無心想故名無相行有相行者如勸發品中專念法華文字精進不臥如救頭然若行成就即見普賢等得三陀羅尼若顧身命貪四事供養不能勤修經劫不得一心奉請諸法無諍三昧法門拜觀同上思大撰欲學法先持淨戒勤禪定乃能得之無量佛法功德皆從禪定生次問答釋疑後具明四念處各各具足一切佛法一心奉請摩訶止觀拜觀同上智者說天台傳南嶽三種止觀一漸次即釋禪波羅蜜次第法門二不定即六妙門今已忘失三圓頓即今摩訶止觀皆是大乘俱緣實相同名止觀漸則初淺後深如彼梯隥不定前後更互如金剛寶置之日中圓頓初後不二如通者騰空為三根性說三法門今圓頓者初緣實相造境即中無不真實繫緣法界一念法界一色一香無非中道己界及佛界衆生界亦然陰入皆如無苦可捨無明塵勞即是菩提無集可斷邊邪皆中正無道可修生死即涅槃無滅可證無苦無集故無世間無道無滅故無出世間純一實相實相外更無別法法性寂然名止寂而常照名觀雖言初後無二無別是名圓頓止觀此菩薩聞圓法起圓信立圓行住圓位以圓功德而自莊嚴以圓力用建立衆生大經云雪山有草名曰忍辱牛若食者即得醍醐又云譬如有人在大海浴當知己用諸河之水當知止觀諸佛之師以法常故諸佛亦常樂我淨等亦復如是開章為十一大意二釋名三體相四攝法五偏圓六方便七正觀八果報九起教十旨歸初釋大意囊括始終冠戴初後今撮為五謂發大心修大行感大果裂大網歸大處一發大心者約十種發心以簡非發菩提心即是觀邪僻心息即是止約四諦四宏六即以顯是二修大行者勸進四種三昧入菩薩位一常坐二常行三半行半坐四非行非坐三感大果者若行順中道即有勝妙果報設未出分段所獲華報亦勝七種方便況真果報耶此義在後第八重中當廣分別四裂大網者若人善用止觀觀心則內慧明了通達漸頓諸教如破微塵出大千經卷恆沙佛法一心中曉此義至第九重當廣說攝法中亦略示五歸大處者自向三德引他同入三德故名旨歸入祕密藏至第十重中當廣說也記曰此五略祇是十廣初五章祇是發菩提心一意耳方便正觀祇是四三昧耳果報一章祇明違順違即二邊果報順即勝妙果報起教一章轉其自心利益於他或作佛身施權實或作九界像對揚漸頓轉漸頓宏通漸頓旨歸章祇是同歸大處祕藏中故知略廣意同也二釋止觀名略有四一相待二絶待三會異四通三德一相待者止觀各三義止三義者息義停義對不止止義觀三義者貫穿義觀達義對不觀觀義二絶待者橫破豎破上三止觀則不可說有因緣故亦可得說以六即望之初心無所失聖境無所濫三會異者會諸經論異名四通三德者以三德共通兩字又三德各通兩字三釋止觀體相為四一教相二眼智三境界四得失一教相者止觀名教通於凡聖不可尋通名求於別體故用相簡之簡前三教顯圓頓教止觀體也二眼智者止觀為因智眼為果用不思議眼智得圓頓止觀體也三境界者若得能顯眼智中意無俟所顯諦境之說為未解者更此一科夫信行尚多聞因此分別以會圓妙法行宗深觀緣此思惟以見正境耳四得失者失即思議得即不思議也四明止觀總持遍收諸法一攝一切理二攝一切惑三攝一切智四攝一切行五攝一切位六攝一切教五明偏圓者簡偏就圓一明大小二明半滿三明偏圓四明漸頓五明權實六明方便謂善巧修行以微少善根能令無量行成解發入菩薩位圓教以假名五品觀行等位去真猶遠名遠方便六根清淨相似鄰真名近方便今就五品之前假名位中復論遠近二十五法為遠方便十種境界為近方便橫豎該羅十觀具足成觀行位能發真似今釋遠方便略為五一具五緣二訶五欲三棄五蓋四調五事五行五法具五緣者一持戒清淨二衣食具足三間居靜處四息諸緣務五得善知識訶五欲者謂色聲香味觸棄五蓋者謂貪欲瞋恚睡眠掉悔疑調五事者謂食眠身息心行五法者謂欲精進念巧慧一心已上俱有事解理解七明正修止觀者前六重依修多羅以開妙解今依妙解以立正行膏明相賴目足更資行解既勤三障四魔紛然競作重昏巨散翳動定明不可隨不可畏隨之將人向惡道畏之妨修正法當以觀觀昏即昏而朗以止止散即散而寂如猪揩金山衆流入海薪熾於火風益求羅耳開止觀為十一陰界入二煩惱三病患四業相五魔事六禪定七諸見八增上慢九二乘十菩薩此十境通能覆障始自凡夫正報終至聖人方便陰入一境常自現前恆得為境餘九境發可為境不發何所觀又八境去正道遠深加防護得歸正轍二境去正道近至此位時不慮無觀薄修即證又若不解諸境互發大起疑網如在疑道不知所從先若聞之恣其變怪心安若空第一觀陰界入境者五陰十二入十八界也界內外一切陰入皆由心起佛告比丘一法攝一切法所謂心是心是惑本若欲觀察須伐其根如灸病得穴今當去丈就尺去尺就寸置色等四陰但觀識陰識陰者心是也觀心具十法門一觀不可思議境二起慈悲心三巧安止觀四破法遍五識通塞六修道品七對治助開八知次位九能安忍十無法愛此十重觀法橫豎收束微妙精巧初則簡境真僞中則正助相添後則安忍無著意圓法巧該括周備規矩初心將送行者到彼薩雲非暗證禪師誦文法師所能知也一觀心是不可思議境者若無心而已介爾有心即具三千亦不言一心在前一切法在後亦不言一切法在前一心在後若從一心生一切法者此則是縱若心一時含一切法者此則是橫縱亦不可橫亦不可祇心是一切法一切法是心故非縱非橫非一非異𢆯妙深絶非識所識非言所言所以稱為不可思議境也此不思議境何法不收此境發智何智不發依此境發誓願乃至無法愛何誓不具何行不滿足耶說時次第行時一心中具一切心二發正真菩提心者既深識不思議境知一苦一切苦自悲悲他發兩誓願衆生無邊誓願度煩惱無盡誓願斷又識不可思議心一樂一切樂我及衆生昔雖求樂不知樂因今方始解故起大慈興兩誓願法門無量誓願學佛道無上誓願成三善巧安心者善以止觀安於法性也隨根隨病回轉自行化他有六十四番安心法等四破法遍者不思議一境一切境一心一切心橫豎諸法悉趣於心破心故一切皆破故言遍也是中先約空無生門以次第破顯圓頓破然後以一門破例餘門破文廣義深須細尋之五識通塞者破塞存通如除膜養珠破賊護將六明道品調適者由圓三十七品入圓三解脫門七助道對治者以根鈍故不能即開三解脫門以遮重故牽破觀心為是義故應須治道對破遮障於助六度但作一事解不能助道當觀此助不思議攝一切法八明次位者夫真似二位有解脫知見朱紫分明終不謬謂未得謂得豈有凡夫造心即言上聖此非增上慢推與誰乎次明從五悔登隨喜品乃至十信四十二位究竟妙覺無有叨濫名知次位九安忍者若名利眷屬從外來破憶此三術囓齒忍耐雖千萬請確乎難拔讓哉隱哉去哉若煩惱業定見慢等從內來破者亦憶三術即空即假即中十無法愛者行上九事過內外障應得入真而不入者以法愛住著而不得前若破法愛入三解脫發真中道所有慧身不由他悟自然流入薩婆若海是十種法名大乘觀學是乘者名摩訶衍行住坐臥語作見色聞聲嗅香嘗味覺觸知法一切緣中一切境中皆可修之第二觀煩惱境乃至第七觀諸見境各為四意各論十乘具如全帙後三境不說後三大章亦不說一心奉請釋禪波羅蜜次第法門拜觀同上智者說法慎記灌頂再治大意釋名明門辨詮次簡法心分別前方便釋修證一心奉請修習止觀坐禪法要拜觀同上天台山修禪寺沙門智顗述具緣訶欲棄蓋調和方便正修善發覺魔治病證果後附梁肅天台止觀統例及天台法門議一心奉請釋摩訶般若波羅蜜經覺意三昧拜觀同上智者說釋法相釋覺意三昧名釋方便行明心相入觀門證相門一心奉請四念處拜觀同上智者說先明一切諸法皆不可思議不可宣說次明四悉檀因緣故亦可得說乃約生生等四伺各明四門四念處三十七品因行果位差別不同一心奉請法界次第初門拜觀同上天台山修禪寺沙門釋智顗依經附論撰初門三百科有三意一恐讀經尋論隨見法門或迷名數二恐未明佛制法門深淺次第三為學三觀者當以此諸法名相義理一一歷心而轉作則觀解無礙觸境不迷若於一念心中通達一切佛法者自了了也一心奉請淨土十疑論拜觀同上智者說一心奉請瑜伽師地論釋拜觀同上最勝子等諸菩薩造唐大慈恩寺沙門釋玄奘譯一心奉請攝大乘論釋攝大乘論釋攝大乘論釋拜觀同上世親菩薩釋前大乘論本玄奘譯第二陳優禪尼國沙門真諦譯第三隋南天竺沙門達摩笈多譯一心奉請攝大乘論釋拜觀同上玄弉譯無性菩薩釋前攝大乘論本一心奉請成唯識論拜觀同上護法等十菩薩各造論十卷釋世親三十頌弉師博觀而擇取撰成十卷瑜伽宗之精要也一心奉請成唯識寶生論拜觀同上唐大薦福寺沙門釋義淨譯護法菩薩釋天親所造論一心奉請大乘廣五蘊論拜觀同上安慧菩薩造唐中印土沙門地婆訶羅譯一心奉請觀所緣緣論釋拜觀同上唐大薦福寺沙門釋義淨譯護法菩薩釋緣緣論中破執縱奪之法一心奉請廣百論釋論拜觀同上唐大慈恩寺沙門釋玄弉譯護法菩薩釋前廣百論本與成唯識破我法二執處相為表裏一心奉請華嚴懸談會玄記拜觀同上元蒼山再光寺普瑞集一心奉請佛說觀無量壽佛經疏妙宗鈔拜觀同上宋四明沙門知禮述先略明大意云果佛圓明之體即我凡夫所具性德故一切教所談行法無不為顯此之覺體故四三昧通名念佛但其觀法為門不同今此觀門及般舟三昧託彼安養依正之境用微妙觀專就彌陀顯真佛體雖託彼境須知依正同居一心心性遍周無法不造無法不具據乎心性觀彼依正依正可彰託彼依正觀於心性心性易發所言心性具一切法者實無能具所具能造所造即心是法即法是心能造因緣及所造法皆悉當處全是心性是故今觀若依若正乃法界心觀法界境生於法界依正色心故釋觀字用一心三觀釋無量壽用一體三身體宗力用義並從圓判教屬頓一心奉請金光明經𢆯義拾遺記拜觀同上知禮述法性可尊可貴當體名金寂而常照當體名光大悲益物當體稱明是知法性具金光明真實名義究竟成就也此經以金光明為名以金光明為體以金光明為宗以金光明為用以金光明而為教相亦可三字別得五章以金為體以光為宗以明為用總三為名分別三名而為教相法體既爾體德合然甚深是光之德窮法性底故無量是明之德達法性邊故此二不二是金之德法性究竟尊貴義故亦可三義皆甚深皆無量皆不二也五章之德莫不如是一心奉請金光明經文句記拜觀同上知禮述一心奉請請觀音疏闡義鈔拜觀同上宋錢塘沙門智圓述一心奉請仁王護國般若經疏神寶記拜觀同上宋四明沙門柏庭善月述是經有六名其末名龍寶神王一心奉請般若波羅蜜多心經略疏連珠記拜觀同上宋玉峰沙門釋師會譯一心奉請佛母般若波羅蜜多圓集要義論釋拜觀同上宋北印度沙門施護譯三寶尊菩薩造釋大域龍菩薩所造頌一心奉請法華𢆯義釋籤拜觀同上唐天台沙門湛然述昔於台嶺隨諸問者籤下所録晚還毗壇增而飾之一心奉請法華文句記拜觀同上湛然述一心奉請觀音𢆯義記拜觀同上宋四明沙門知禮述一心奉請觀音義疏記拜觀同上知禮述即釋義疏也後附天竺寺沙門遵式釋重頌云第二重頌是隋煬帝大業中智者滅後笈多所譯方入大部故疏闕釋一心奉請涅槃𢆯義發源機要拜觀同上宋錢塘沙門釋智圓釋一心奉請大乘百法明門論解拜觀同上唐大慈恩寺沙門釋窺基述一心奉請大乘起信論疏拜觀同上唐西太源寺沙門釋法藏譯一心奉請大乘起信論疏筆削記拜觀同上宋長水沙門釋子璿録一心奉請肇論新疏游刃拜觀同上元大白馬寺沙門釋文才述科一卷新疏九卷游刃一卷一心奉請摩訶止觀輔行傳宏決拜觀同上唐毗陵沙門湛然述述此緣起凡有十義一為知有師承非任胸臆異師心故二為曾師承者而棄根本隨末見故三為後代展轉隨生異解失本依故四為信宗好習餘方無師可稟承故五為義觀俱習好憑教者行解備故六為點示關節廣略起盡宗要文故七為建立師解使不淪墜益來世故八為自資觀解以防謬誤易尋討故九為呈露所解恐有迷忘求刪削故十為隨順佛旨運大悲心利他行故一心奉請止觀義例拜觀同上湛然述第一所傳部別例第二所依正教例第三依正消釋例第四大章總別例第五心境釋疑例第六解行相資例第七喻疑顯正例一心奉請止觀大意拜觀同上湛然述因員外李華欲知止觀大意略報綱要初敘承二敘教觀三敘教四敘觀一心奉請觀心論疏拜觀同上隋天台國清寺沙門灌頂撰以上東土論及論釋
