body:
  text: 以上密壇寶法壬集已詳孔金光明最勝王無量真言尚待補錄其水陸本宗另作數條續於壬字之後但既非龍藏彚記所存又非蕅書所錄殆或有或無矣然木本水源不忍棄置姑存梗概云以上壬字是增出諸法雖非一一單有卷冊然聖所寄亦名法寶茲之懺法銜接而來兼及餘法一心奉請慈悲道場懺法拜觀同上梁天監年高僧倣淨住子製歸依三寶第一斷疑第二懺悔第三發菩提心第四發願第五發回向心第六顯果報第七出地獄第八解怨釋結第九自慶第十警緣三寶第十一懺主謝大眾第十二總發大願第十三奉為天道禮佛第十四奉為諸仙禮佛第十五奉為梵王等禮佛第十六奉為阿修羅道一切善神禮佛第十七奉為龍王禮佛第十八奉為魔王禮佛第十九奉為國王人道禮佛第二十奉為諸王王子禮佛第二十一奉為父母禮佛第二十二奉為過去父母禮佛第二十三奉為師長禮佛第二十四為十方比丘比丘尼禮佛第二十五為十方過去比丘比丘尼禮佛第二十六為阿鼻地獄禮佛第二十七為灰河餓鬼等地獄禮佛第二十八為飲銅炭坑等地獄禮佛第二十九為刀兵銅釜等地獄禮佛第三十為火城刀山等地獄禮佛第三十一為餓鬼道禮佛第三十二為畜生道禮佛第三十三為六道發願禮佛第三十四警念無常第三十五為執勞運力禮佛第三十六發回向第三十七菩薩回向法第三十八發願第三十九凡八段囑累第四十一心奉請方等三昧行法拜觀同上隋智者大師說門人灌頂記方等秘法具六緣第一一法緣二善知識三前方便四辦衣五行法六供養識遮障第二一洗浴調適二飲食調適三行道調適四坐禪調適禁法第三一七日要心及誦呪二請師受戒及發露三見善惡業相及十法王子等不得向人說內律要訣第四一明五篇戒滅不滅相二明十惡十善業滅不滅相修行第五受戒第六不說一心奉請法華三昧懺儀拜觀同上瓦官寺沙門釋智顗輒采法華普賢觀經及諸大乘經意撰此法門流行後代勸修第一方便第二正入道場方法第三正修行方法第四一嚴淨道場二淨身三三業供養四奉請三寶五讚歎三寶六禮佛七懺悔八行道旋遶九誦法華經十思惟一實境界略明修證相第五一心奉請法華三昧行事運想補助儀拜觀同上唐國清沙門湛然撰撰香華禮佛等偈以便運想及逆順十心略懺文等一心奉請金光明懺法補助儀拜觀同上宋天台東掖山沙門遵式集緣起第一按文開章以定詮次第二別明禮請灑散二法第三略明能請及所求離過第四總示事理觀慧所依第五補助正修十科事義第六一嚴淨道場二清淨三業三香華供養四召請誦呪五讚歎述意六稱名散灑七禮敬三寶八修行五悔九旋遶自歸十唱誦金光明典一心奉請金光明最勝懺儀拜觀同上宋四明沙門知禮集大段與前儀同而觀慧文略一心奉請往生淨土懺願儀拜觀同上沙門遵式轍采大本無量壽經及稱讚淨土等諸大乘經集此方法流布諸後普結淨緣一嚴淨道場二明方便法三明正修意四燒香散華五禮請法六讚歎法七禮佛法八懺願法九旋誦法十坐禪法一心奉請請觀世音菩薩消伏毒害陀羅尼三昧儀拜觀同上東山沙門遵式始於天台國清集於四明大靁山蘭若再治敘緣起第一明正意第二一莊嚴道場二作禮三燒香散華四繫念數息五召請六具楊枝淨水七誦三呪八披陳懺悔九禮佛旋遶十誦經一心奉請千手千眼大悲心呪行法拜觀同上宋四明沙門知禮集一嚴道場二淨三業三結果四修供養五請三寶諸天六讚歎申誠七作禮八發願持呪九懺悔十修觀行一心奉請熾盛光道場念誦儀拜觀同上宋天竺寺沙門遵式撰第一設壇場供養第二示方法第三揀眾清淨第四誦呪法第五三業供養禮請陳意自為七一供養二奉請三讚歎四作法持呪五禮佛六懺悔七行道旋遶第六疑釋第七誡勸檀越一心奉請觀自在菩薩如意輪呪課法拜觀同上宋霅川沙門仁岳撰一法式二觀想三禮讚四持誦五懺願六證驗七釋疑一心奉請禮法華經儀式拜觀同上宋四明沙門知禮集一心奉請釋迦如來涅槃禮讚文拜觀同上沙門仁岳撰一心奉請集諸經禮懺文拜觀同上唐西崇福寺釋智昇撰上卷共有六段下卷約求生西方明六時禮法一心奉請往生淨土決疑行願二門拜觀同上宋耆山沙門遵式撰第一決疑門一疑師二疑法三疑自今竝決之第二行願門一禮懺門即世稱小淨土懺二十念門三繫緣門四眾福行一心奉請淨土境觀要門拜觀同上元虎谿沙門懷則述深明約心觀佛境觀不二法門一心奉請蓮宗寶鑑拜觀同上元廬山東林寺善法堂主優曇普度集念佛正因第一九十四章念佛正教第二凡十九章念佛正宗第三凡八章念佛正派第四凡二十二章念佛正信第五凡六章念佛正行第六凡十四章念佛正願第七凡七章念佛往生正訣第八凡十二章念佛正報第九凡五章念佛正論第十凡二十五章附楚山示眾念佛警語曉山勸修淨業箴一心奉請阿彌陀經不思議神力傳拜觀同上附隋錄未詳作者一心奉請南嶽思大禪師立誓願文拜觀同上一心奉請天台智者大師別傳拜觀同上門人灌頂撰一心奉請天台八教大意拜觀同上門人灌頂撰前佛後佛自行化他究其旨歸咸宗一妙佛之知見但機緣差品應物現行為實施權故分乎入頓漸秘密不定化之儀式譬如藥方藏通別圓所化之法譬如藥味一心奉請國清百錄拜觀同上纂人同上卷第一二立制法第一敬禮法第二乃至王重請書第五十卷第三四王謝義疏書第五十一乃至論放生書第一百後有戒應題有嚴序及新添智者大禪師年譜事迹一心奉請永嘉集拜觀同上唐慎水沙門玄覺述舊分十門慕道志儀第一戒憍奢意第二淨修三業第三奢摩他頌第四毗婆舍那頌第五優畢叉頌第六三乘漸次第七事理不二第八勸友人書第九發願文第十幽谿法師新定十門歸敬三寶第一發宏誓願第二親近師友第三衣食警戒第四淨修三業第五三乘漸次第六事理不二第七簡示偏圓第八正修止觀第九觀心十門第十幽溪有註二冊可作四卷尚未入藏甚妙南北兩藏皆無禪宗二字流通作禪宗永嘉集幽溪作永嘉禪宗集一心奉請金剛錍拜觀同上唐荊谿尊者述序曰圓伊金錍以抉四眼無明之膜令一切處悉見遮那佛性之指偏權疑碎加之以剛假夢寄客立以賓主觀者恕之一心奉請始終心要拜觀同上唐荊谿尊者述一心奉請十不二門拜觀同上唐荊谿尊者述一色心二內外三修性四因果五染淨六依正七自他八三業九權實十受潤即釋籤中結釋十妙文也以是妙觀大體故後人錄出別行一心奉請十不二門指要鈔拜觀同上宋四明沙門知禮述敘曰十不二門者本出釋籤豈須鈔解但斯宗講者或示或註著述云云而事理未明解行無託荊谿妙解翻隱於時天台圓宗罔益於物爰因講次對彼釋之命為指要鈔焉葢指介爾之心為事理解行之要也一心奉請修懺要旨拜觀同上宋四明沙門知禮述初通敘四行二正明法華三結歸止觀一心奉請法智遺編觀心二百問拜觀同上法孫繼忠集四明沙門謹用為法之心問義於浙陽講主昭上人一心奉請天台傳佛心印記拜觀同上元傳天台宗教興教大師懷則述深明性具圓宗直至人心見性成佛不同餘宗緣理斷九一心奉請天台四教儀拜觀同上宋高麗沙門諦觀錄本宗八教大意而詳於名相略於前三教之十乘一心奉請天台四教儀集註拜觀同上元南天竺沙門蒙潤集一心奉請宗鏡錄拜觀同上宋永明寺智覺禪師延壽述一心奉請景德傳燈錄拜觀同上宋景德東吳沙門道原纂先敘七佛并偈始自摩訶迦葉終於南岳第九世青原第十一世共祖師一千七百十二人內九百五十四人有語見錄餘七百五十八人但存名字盡二十六卷寶誌善慧南岳天台僧伽萬迴豐干寒山拾得布袋十人及諸方襍舉徵拈代別語一卷南陽大寂乃至法眼等十二人廣語一卷讚頌偈詩一卷銘記箴歌一卷一心奉請續傳燈錄拜觀同上不出編錄人名彚目義門云靈谷寺沙門居頂編始自汾陽昭終至天童禮及諾菴肇共三千一百一十八人內一千二百零三人有語見錄一千九百零七人但存名字一心奉請傳法正宗記拜觀同上宋明教禪師契嵩編修前有上皇帝書及許收入藏中書劄子并題䟦等始祖釋迦如來表一卷迦葉至六祖傳共五卷正宗分家列傳一千三百零四人共二卷旁出略傳二百五人宗證略傳十一共一卷定祖圖一卷一心奉請傳法正宗論拜觀同上宋明教禪師契嵩編修共有四篇廣明達磨大師的有師承以破唐沙門神機之妄譏毀兼破付法藏因緣傳一心奉請宗門統要續集拜觀同上宋建康沙門宗永集元保寧寺沙門清茂續集釋迦文佛西竺應化聖賢二十八祖東土六祖四祖旁出凡八世五祖旁出凡三世六祖下旁出凡二世應化聖賢未詳嗣法亡名古宿南嶽下凡十一世共二百四十八人五百五十三則機緣青原下凡十世共二百六十四人五百五十四則機緣續南獄下至十八世共二百一十二則機緣續青原下至十四世共四十七則機緣一心奉請禪宗正脉拜觀同上明弘治真如寺沙門如巹集於五宗機緣中取其顯明簡直者集出使人易曉一心奉請六祖大師法寶壇經拜觀同上嗣祖比丘宗寶編靈谷住持淨戒重校韶州韋刺史請師於大梵寺說法師先說得法行由次說摩訶般若波羅蜜義并無相頌次答實無功德之疑次答願生西方之問要人淨心則生淨土不是說無西方也次示定慧一體不二次示一行三昧次示心不住法道即流通心若住法名為自縛次示教無頓漸人有利鈍次示坐禪元不著心亦不著淨亦不是不動次示坐禪實義次傳自性五分法身香授無相懺悔發四弘誓願授無相三歸依戒又說一體三身及頌一心奉請古尊宿語錄拜觀同上賾藏主集靈谷寺住持淨戒重校南嶽讓馬祖一百丈海黃蘗運臨濟玄興化獎睦州蹤南院顒風穴沼首山念石門聰汾陽昭唐明嵩慈明圓南泉願子湖神力蹤趙州諗雲門偃楊岐會道吾真白雲端佛照光北磵簡物初觀晦機熙笑隱訢仲方倫覺源曇有宋濂藏衣塔銘五祖演葉縣省神鼎諲翠岩芝法華舉佛眼遠大隋真投子同鼓山晏洞山初嗣雲門智門祈嗣香林雪峰悅嗣大愚雲菴文嗣黃龍南琅琊覺嗣汾陽佛照禪師奏對錄宋孝宗時嗣大慧杲一心奉請黃蘗山斷際禪師傳心法要并宛陵錄拜觀同上唐河東裴休集并序即古尊宿語錄中重出而稍略一心奉請萬善同歸集拜觀同上宋永明智覺禪師延壽述明眾善所歸皆宗實相一心奉請唯心訣拜觀同上宋永明智覺禪師延壽述於中略標百二十種邪宗見解一心奉請定慧相資歌拜觀同上一心奉請警世拜觀同上二竝永明壽禪師作一心奉請明覺禪師語錄拜觀同上明靈谷寺沙門淨戒重校上堂舉古勘辨拈古偈頌讚等共六卷一心奉請圓悟佛果禪師語錄拜觀同上學徒若平集淨戒重校上堂語六卷開示法語三卷小參四眾四卷頌古一卷拈古三卷偈頌讚一卷一心奉請大慧普覺禪師語錄拜觀同上宋乾道門人蘊聞集一心奉請中峯和尚廣錄拜觀同上元治至門人慈寂集一心奉請真心直說拜觀同上元曹谿山老納知訥述凡十五章明正信異名妙體妙用乃至所往以釋疑問後附誡初心學人文又附皖山正疑禪師示蒙山法語東山崇藏主送子行脚法語蒙山示眾𫎇堂䟦一心奉請高麗國普照禪師修心訣拜觀同上直指心性本來同佛既悟心已或習輕則用自性定慧門或習重則用隨相對治門皆與