body:
  text: 一心奉請立世阿毗曇論拜觀同上唐優禪尼國沙門真諦譯地動品南閻浮提品六大國品夜叉神品漏闍耆利象王品四天下品數量品天住處品歡喜園品衆車園品惡口園品雜園品波利夜多園品提頭賴吒城品毗留勒叉城品毗留博叉城品毗沙門城品天非天鬥戰品日月行品云何品受生品壽量品地獄品小三災品大三災品一心奉請阿毗達磨集異門足論拜觀同上一名説一切有部集異門足論舍利子説唐大慈恩寺沙門玄奘譯緣起品第一世尊遊力士生處住其所造初成臺觀命舍利子代宣法要舍利子承命結集法毗奈耶一法品第二有三門二法品第三有二十七門三法品第四有五十門四法品第五亦五十門五法品第六有二十四門六法品第七有二十四門七法品第八有二十三門八法品第九有十門九法品第十略有二種十法品第十一略有二種讚勸品第十二佛從臥起讚善勸持一心奉請舍利弗阿毗曇論拜觀同上姚秦天竺三藏曇摩崛多共曇摩耶舍譯問分入品第一界品第二陰品第三四聖諦品第四根品第五七覺品第六不善想品第七善根品第八大品第九優婆塞品第十非問分界品第一業品第二人品第三智品第四緣品第五念處品第六正勤品第七神足品第八禪定品第九道品第十煩惱品第十一攝相應分攝品第一上相應品下諸分遍品第一因品第二名色品第三假結品第四行品第五觸品第六假心品第七十不善業道品第八十善業道品第九定品第十一心奉請阿毗達磨法蘊足論拜觀同上一名説一切有部法蘊足論大目乾連造唐大慈恩寺沙門釋玄奘譯學處品第一明優婆塞五戒預流支品第二明四種法行一親近善士二聽聞正法三如理作意四法隨法行證淨品第三明四不壞淨一佛證淨二法證淨三僧證淨四聖所愛戒沙門果品第四明四聖果通行品第五明四通行一苦遲通行二苦速通行三樂遲通行四樂速通行聖種品第六明於衣食臥具知足及樂斷樂修聖種正勝品第七明四正勤神足品第八明欲勤心觀四三摩地念住品第九明身受心法四觀聖諦品第十明四聖諦靜慮品第十一明四禪法無量品第十二明慈悲喜捨定無色品第十三明四空定修定品第十四明四修定一得現法樂住二得殊勝智見三得勝分別慧四得請漏永盡覺支品第十五明七覺支雜事品第十六明永斷一一法皆能保彼定不退還謂貪瞋癡乃至苦憂擾惱等根品第十七明三十二根處品第十八明十二處蘊品第十九明五蘊多界品第二十明界處蘊緣起及處非處善巧緣起品第二十一明十二因緣法一心奉請施設論拜觀同上宋中印土沙門施護譯對法大論中世間施設門第一按釋論有此門梵本元闕因施設門第二問答輪王七寶因果第三明輪王七寶同如來法第四問答佛生先現瑞相第五問答佛出時處第六問答諸因果事第七明三毒輕重由於習成第八第九問答世間諸法不同所問第十問答山地方處等殊第十一問答化事第十二問答大海事第十三問答神通事第十四問答雨不雨事一心奉請阿毗達磨發智論拜觀同上一名説一切有部發智論尊者伽多衍尼子造唐大慈恩寺沙門釋玄奘譯雜蘊第一蘊梵名犍度世第一法納息一納息梵名跋渠智納息二補特伽羅納息三愛敬納息四無慚納息五相納息六無義納息七思納息八結蘊第二不善納息一一行納息二有情納息三十門納息四智蘊第三學支納息一五種納息二他心智納息三修智納息四七聖納息五業蘊第四惡行納息一邪語納息二害生納息三表無表納息四自業納息五大種蘊第五大造納息一緣納息二具見納息三執受納息四根蘊第六根納息一有納息二觸納息三等心納息四一心納息五魚納息六因緣納息七定蘊第七得納息一緣納息二攝納息三不還納息四一行納息五見蘊第八念住納息一三有納息二想納息三智納息四見納息五伽陀納息六彚門標目云佛滅後三百年造乃對法藏之根本也一心奉請阿毗曇八犍度論拜觀同上苻秦罽賓國沙門瞿曇僧伽提婆共竺佛念譯即發智論同品先譯一心奉請阿毗達磨大毗婆沙論拜觀同上唐大慈恩寺沙門釋玄奘譯五百大阿羅漢造廣釋説一切有部發智論一心奉請阿毗曇毗婆沙論拜觀同上北涼沙門浮陀跋摩共道泰譯與前同僅存三犍度一心奉請婆沙論拜觀同上迦栴延子造苻秦罽賓國沙門僧伽跋澄譯説阿毗曇八犍度第一婆沙三結處第一三不善根處第二三有漏處第三四流處第四四受處第五四縛處第六五蓋處第七五結處第八五下結處第九五上結處第十五見處第十一六身愛處第十二七使處第十三九結處第十四九十八使處第十五小章竟解十門大章二十二根處第十六十八界處第十七十二入處第十八五陰處第十九五盛陰處第二十亦名五取陰亦名五受陰唯是有漏六界處第二十一色無色法處第二十二可見不可見法處第二十三有對無對處第二十四有漏無漏處第二十五有為無為法處第二十六三世處第二十七善不善無記處第二十八欲界色界無色界繫法處第二十九學無學非學非無學法處第三十見斷思惟斷不斷法處第三十一四聖諦處第三十二四禪處第三十三四等處第三十四四無色處第三十五八解脫處第三十六八除入處第三十七即八勝處也十一切入處第三十八八智處第三十九三三昧處第四十廣説大章竟中陰處第四十一出阿毗曇結使犍度人品非次四生處第四十二一心奉請阿毗達磨俱舍論拜觀同上尊者世親造唐大慈恩寺沙門釋玄奘奘分別界品第一分別根品第二分別世品第三分別業品第四分別隨眠品第五分別賢聖品第六分別智品第七分別定品第八破我執品第九一心奉請阿毗達磨俱舍釋論拜觀同上陳優禪尼國沙門真諦譯與前本同一心奉請阿毗達磨俱舍論本頌拜觀同上世親菩薩造唐大慈恩寺沙門釋玄奘譯即前本頌別行一心奉請阿毗達磨順正理論拜觀同上一名説一切有部順正理論尊者衆賢造玄奘譯辨本事品第一明蘊處界三種攝法辨差別品第二明二十二根差別及破無因一因不平等因辨心心所及不相應等及辨六因四緣辨緣起品第三明三界五趣七識住九有情居四生及辨中有相十二因緣相有情世間相器世間相辨業品第四辨隨眠品第五辨賢聖品第六辨智品第七辨定品第八一心奉請阿毗達磨藏顯宗論拜觀同上衆賢造玄奘譯即前本略出而增序品一心奉請阿毗達磨識身足論拜觀同上一名説一切有部識身足論提婆設摩阿羅漢造玄奘譯目乾連蘊第一沙門目連作如是説過去未來無現在無為有今依諸契經種種破之補特伽羅蘊第二補特伽羅論者作如是説定有補特伽羅性空論者依諸契經種種破之因緣蘊第三問答諸法互為因緣義所緣緣蘊第四問答諸所緣義雜蘊第五明起染離染等義成就蘊第六廣明十二心成就不成就等差別十二心者欲界繫有四心一善二不善三有覆無記四無覆無記色無色界繫各有三心除不善并學心無學為十二一心奉請阿毗達磨界身足論拜觀同上一名説一切有部界身足論尊者世友造玄奘譯本事品第一明十大地法十大煩惱十小煩惱五煩惱五見五觸五受根五法六識身六觸六受六想六思六愛分別品第二分別相應不相應等略説十六門廣有八十八門後有釋基序一心奉請阿毗達磨品類足論拜觀同上世友造玄奘譯辨五事品第一一色二心三心所四不相應行五無為辨諸智品第二辨諸處品第三辨七事品第四辨隨眠品第五辨攝等品第六辨千問品第七舉二十門各為五十問答辨決擇品第八一心奉請衆事分阿毗曇論拜觀同上劉宋中天竺沙門求那跋陀羅共菩提耶舍譯同前本而止七品一心奉請阿毗曇心論拜觀同上尊者勝法造東晉罽賓國沙門瞿曇僧伽提婆共慧遠譯界品第一行品第二業品第三使品第四賢聖品第五智品第六定品第七契經品第八雜品第九論品第十一心奉請法勝阿毗曇心論拜觀同上大德優婆扇多釋高齊烏萇國沙門那連提黎耶舍譯釋前論一心奉請雜阿毗曇心論拜觀同上劉宋天竺沙門僧伽跋摩等譯尊者法救造梵稱達磨多羅亦釋前論而加序品又加第十擇品而以論品為第十一較優波扇多者為詳一心奉請阿毗曇甘露味論拜觀同上尊者瞿沙造曹魏代譯失三藏名布施持戒品第一界道品第二住食生品第三業品第四陰持入品第五持即界也行品第六因緣種品第七淨根品第八結使禪智品第九三十七無漏人品第十智品第十一禪定品第十二雜定品第十三三十七品第十四四諦品第十五雜品第十六一心奉請入阿毗達磨論拜觀同上一名説一切有部建地羅阿羅漢造唐大慈恩寺沙門釋玄奘譯略明三藏及三無為名義一心奉請五事毗婆沙論拜觀同上尊者法救造玄奘譯分別色品分別心品分別心所法品釋世友五事論文來未盡一心奉請阿毗曇五法行經拜觀同上後漢安息國沙門安世高譯釋四諦五法一心奉請尊婆須蜜菩薩所集論拜觀同上苻秦罽賓國沙門僧伽跋澄等譯此菩薩即當來師子如來偈品首聚犍度心犍度三昧犍度天犍度四大犍度契經犍度更樂犍度結使犍度行犍度智犍度見犍度根犍度一切有犍度偈犍度一心奉請成實論拜觀同上訶黎跋摩造姚秦天竺沙門鳩摩羅什譯發聚中佛寶論五品法寶論三品僧寶論三品吉祥品立論品等六品十論初有相品等十七品苦諦聚色論二十四品識論十七品想陰一品受陰六品行陰論十一品集諦聚業論二十六品煩惱論二十品滅諦聚十四品道諦聚四十八品一心奉請四諦論拜觀同上婆藪跋摩所造陳優禪尼國沙門真諦譯思擇品略説品分別苦諦品思量集諦品分別滅諦品分別道諦品一心奉請解脫道論拜觀同上羅漢優波底沙造蕭梁扶南國沙門僧伽婆羅譯因緣品第一分別戒品第二頭陀品第三分別定品第四覓善知識品第五分別行品第六謂欲行瞋行癡行分別行處品第七行門品第八謂修十一切入十不淨想十念四無量心四大觀食不耐想如是四十八行五神通品第九分別慧品第十五方品便第十一分別諦品第十二一心奉請隨相論拜觀同上德慧法師造陳優禪尼國沙門真諦譯解四諦十六行相破外道我執一心奉請緣生論拜觀同上隋南天竺沙門達摩笈多譯聖者稜伽造明十二因緣義一心奉請大乘緣生論拜觀同上唐北天竺沙門大廣智不空譯一心奉請十二因緣論拜觀同上元魏北天竺沙門菩提留支譯淨意菩薩釋十二因緣一心奉請止觀門論頌拜觀同上世親菩薩造唐大薦福寺沙門釋義淨譯七十七頌明修不淨觀法門一心奉請金剛針論拜觀同上宋中印度沙門法天譯法稱菩薩破婆羅門四韋陀論一心奉請彰所知論拜觀同上元帝師癹合思巴造釋教總統沙門沙羅巴譯器世界品情世界品由釋十二支中一一皆有五蘊但從勝為名道法品果法品無為法品一心奉請三法度論拜觀同上尊者山賢造東晉罽賓國沙門瞿曇僧伽提婆共慧遠譯德品惡品依品謂陰界入一心奉請四阿含暮抄解拜觀同上阿羅漢婆素跋陀造苻秦沙門鳩摩羅佛提等譯功德三段二惡三段三依三段略同上本一心奉請三彌底部論拜觀同上失譯人名今附三秦録大意破我人知見明中陰不無而文不甚聯絡一心奉請分別功德論拜觀同上失譯人名附後漢録釋增一阿含經序品中偈及念佛等十種一法次釋弟子品各稱第一因緣一心奉請阿含口解十二因緣經拜觀同上後漢安息國優婆塞安玄共嚴佛調譯説欲斷生死趣度世道者須却十二因緣事一心奉請辟支佛因緣論拜觀同上失譯人名今附秦録説八位辟支佛覺悟因緣一心奉請四品學法拜觀同上劉宋天竺沙門求那跋陀羅譯一戒行備具二多知經法三能化度人號真學為上品純行五戒號承學為中品但持四戒號依福學為下品身所護供養於同學法號散侍為外品一心奉請異部宗輪論拜觀同上世友菩薩造唐大慈恩寺沙門釋玄契譯説佛滅百年異執起分二十部別一心奉請十八部論及部異執論拜觀同上失譯人名第二陳優禪尼國沙門真諦譯與上同本西土小乘論
