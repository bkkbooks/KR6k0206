body:
  text: 諸論本皆由西及東不相交互至蕅益分釋論為一起宗論論釋各為一起遂有東土之論序於西之上者以其非無所見故亦仍之但於三起已明後又將台宗懺法收入懺門而本宗各自有書致將台書分成五起頗有可商也至本朝著作未經寓目藕師故不收今略補敘於後而藕書中檢目未得者亦標於後以俟他日考訂一心奉請十住毗婆沙論拜觀同上亦曰十生論龍樹菩薩造姚秦天竺沙門鳩摩羅什譯序品第一入初品第二地相品第三淨地品第四釋願品第五發菩提心品第六分別七因緣發心調伏心品第七因上品説三發心必成餘四不必成問答廣明成不成法有五四合為二十法失菩提心轉此修習世世不忘菩提心阿惟越致相品第八易行品第九廣明念十方佛及阿彌陀佛過去七佛未來彌勒佛三世佛菩薩等以求阿惟越致除越品第十於佛所修懺悔勸請隨喜回向分別功德品第十一明六時懺悔等所有功德分別布施品第十二分別法施品第十三歸命相品第十四明歸依三寶義五戒品第十五知家過患品第十六入寺品第十七明齋日宜受八戒及親近持淨戒者亦不於破戒生輕恚心但應生憐愍心共行品第十八謂在家出家菩薩所共行法四法品第十九明八種四法應遠離八種四法應修習乃至十法能淨治初地念佛品第二十明般舟三昧念佛相好四十不共法品第二十一次明念佛功德法身略説有四十種四十不共法中難一切智人品第二十二問家種種難佛非一切智一一答釋四十不共法中善知不定品第二十三偈讚品第二十四助念佛三昧品第二十五明二種四法能生般舟三昧又在家菩薩有二十法出家六十法助法五十譬喻品第二十六釋經中導師喻喻菩薩通達地法略行品第二十七一不放逸二不放逸及智慧三戒心慧四諦捨滅慧五五根六六度七七正法信慚愧聞進念慧八大人覺少欲知足遠離精進念定慧樂不戲論九大忍大慈大悲慧念堅心不貪不恚不癡十十善道如是等法菩薩應生生已應守護守護已應增長又應遠離惡法所謂一放逸二貪聲聞辟支佛地三憎菩薩及菩薩所行與甚深大乘經四諂曲急性無慈愍五貪欲瞋恚睡眠調戲疑六慳貪破戒瞋恚懈怠調戲愚癡七樂多事務樂多讀誦樂睡眠樂語説貪利養常欲令人喜迷悶於道心生愛行八邪見邪思惟邪語邪業邪命邪方便邪念邪定九不聞無上菩提聞已不信信不受受不持持不知義趣知而不説説而不行行而不常常行而不能善十十不善道成就三十二法乃為菩薩分別二地業道品第二十八分別聲聞辟支佛品第二十九明十善道令何等衆生至二乘地大乘品第三十明菩薩修十善道勝於一切護戒品第三十一明十善十惡果報及六十五分尸羅解頭陀品第三十二明十二行各有十功德利助尸羅果品第三十二明六種四法能淨尸羅又四種似尸羅而破尸羅慎莫為之一説有我二不離身見三見諸法定有四聞諸行無生相心則驚畏又沙門有四應學第四沙門不應為三一者形色相沙門二者威儀矯異沙門三者貪求名利沙門四者真實行沙門讚戒品第三十四戒報品第三十五謂常作轉輪聖王一心奉請十地經論拜觀同上天親菩薩造元魏北天竺沙門菩提留支譯釋華嚴十地品一心奉請大方廣佛華嚴經入法界品四十二字觀拜觀同上唐北天竺沙門大廣智不空譯一心奉請彌勒菩薩所問經論拜觀同上元魏北天竺沙門菩提留支譯釋寶積第四十一會一心奉請大寶積經論拜觀同上菩提留支譯釋寶積第四十三會一心奉請無量壽經優婆提舍拜觀同上婆藪盤豆菩薩造元魏北天竺沙門菩提流支譯天親菩薩明修五念門得生安樂見彌陀禮才讚歎作願觀察回向一心奉請寶髻經四法優婆提舍拜觀同上天親菩薩造元魏烏萇國沙門毗目智仙等譯釋大集第十分一心奉請轉法輪經優婆提舍拜觀同上天親造毗目智仙等譯佛住靈山告智員大海樂説辨才菩薩言有二種住持如來轉法輪謂衆住持法住持一心奉請三具足經優婆提舍拜觀同上天親造毗目智仙等譯佛住毗舍離大林精舍告無垢威德大力士言菩薩有三具足施戒聞也一心奉請佛地經論拜觀同上親光等菩薩造唐大慈恩寺沙門釋玄奘譯經是佛住淨土為妙生菩薩説五種法攝大覺地所謂清淨法界大圓鏡智平等性智妙觀察智成所作智一心奉請勝思惟梵天所問經論拜觀同上元魏北天竺沙門菩提留支譯有論無經文來未盡一心奉請文殊師利菩薩問菩提經論拜觀同上天親菩薩造菩提留支譯一心奉請略説金剛頂瑜伽分別聖位修證法門拜觀同上唐北天竺沙門大廣智不空譯説瑜伽自性三十七聖位謂十六菩薩八方內外大護及法界身一心奉請大樂金剛不空真實三昧耶經般若波羅蜜多理趣釋拜觀同上大廣智不空譯釋本經字句理趣種種表法義門一心奉請般若波羅蜜多理趣經大安樂不空三昧真實金剛菩薩等一十七聖大曼荼羅義述拜觀同上大興善寺三藏阿目伽金剛依釋略序述金剛菩薩名義表法之句一心奉請瑜迦金剛頂經釋字母品拜觀同上唐北天竺沙門大廣智不空譯釋遏阿等五十字門義一心奉請仁王般若陀羅尼釋拜觀同上大廣智不空譯一心奉請諸教決定名義論拜觀同上聖慈氏菩薩造宋北印土沙門施護譯明一切教中諸根本字彼如實義所謂唵字最為上首及吽字阿字等即三身及金剛三業等一心奉請聖佛母般若波羅蜜多九頌精義論拜觀同上勝德赤衣菩薩造施護譯一心奉請佛母般若波羅蜜多圓集要義論拜觀同上大域龍菩薩造施護譯一心奉請金剛頂瑜伽中發阿耨多羅三藐三菩提心論拜觀同上唐北天竺沙門大廣智阿闍梨譯亦名瑜伽總持教門説菩提心觀行修持儀一心奉請事師法五十頌拜觀同上宋西夏沙門日稱等譯馬鳴菩薩依祕密教略出一心奉請大智度論拜觀同上龍樹菩薩造姚秦北天竺沙門鳩摩羅什譯緣起論釋初品盡三十卷釋摩訶般若波羅蜜經九十品一心奉請金剛般若波羅蜜經論拜觀同上無著菩薩造亦名金剛能斷般若隋南天竺沙門達磨笈有譯成立七種義句一種性不斷謂護念付囑二發起行相謂問答住降三行所住處有十八種略為八種四對治謂十八住中各有二種對治五不失謂離增益損減二邊如經中處處云即非是名等六地謂十八處顯示信行地證道住處是淨心地後上求佛地七立名一心奉請能斷金剛般若波羅蜜多經論頌拜觀同上無著菩薩造唐大薦福寺沙門釋義淨譯一心奉請金剛般若波羅蜜經論拜觀同上天親菩薩造元魏北天竺沙門菩提留支譯釋經及無著頌斷七十二疑一心奉請能斷金剛般若波羅蜜多經論釋拜觀同上無著菩薩造頌世親菩薩造釋唐大薦福寺沙門釋義淨譯與前同不列經文末後一頌義淨作一心奉請金剛般若波羅蜜經破取著不壞假名論拜觀同上功德施菩薩造唐中印度沙門地婆訶羅譯一心奉請妙法蓮華經優波提舍拜觀同上元魏北天竺沙門菩提留支共曇林等譯婆藪盤豆菩薩即天親廣釋序品及方便品略釋七喻等一心奉請妙法蓮華經論優波提舍拜觀同上元魏中天竺沙門勒那摩提共僧朗等譯與上論同一心奉請大般涅槃經論拜觀同上元魏沙門達磨菩提譯婆藪盤豆菩薩釋迦葉菩薩所問偈一心奉請涅槃本有今無偈論拜觀同上陳優禪尼國沙門真諦譯天親菩薩造兼釋諸行無常偈一心奉請遺教經論拜觀同上天親菩薩造真諦譯天親於小乘經建立大乘所修行法一心奉請大方廣佛華嚴經疏拜觀同上唐清涼山大華嚴寺沙門澄觀述釋經義總啓十門第一起教因緣謂因緣各開十義第二藏教所攝謂三藏中正經藏攝亦攝餘二於二藏中菩薩藏攝又權不攝此此兼攝權於五教中唯圓教攝此亦攝餘第三義理分劑略分四門一所依體事二攝歸真實三彰其無礙四周遍含容又各十門以顯無盡第四教所被機有十前五揀非器後五彰所為無信違真乖實狹劣守權皆非器正為一乘圓機兼為信向成種引為權教菩薩機為二乘遠為凡夫外道闡提第五教體淺深略明十體一音聲二名句文三通取四法四通攝所詮五諸法顯義六攝境唯心七會緣入實八理事無礙九事事無礙十海印炳現後二正是經宗融取前八無所遺矣第六宗趣通別總為十宗一我法俱有二法有我無三法無去來四現通假實五俗妄真實六諸法但名七三性空有八真空絶相九空有無礙十圓融具德今經以因果緣起理實法界不思議為宗第七部類品會一彰本部二顯品會三明支類四辨論釋第八傳譯感通第九總釋經題初解經題二明品稱解經題中十門分別一通顯得名二對辨開合三具彰義類四別釋得名五展演無窮六卷攝相盡七展卷無礙八以義圓收九攝歸一心十泯同平等第十別解文義亦有十例一本部三分科二問答相屬科三以文從義科四前後褶疊科五前後鉤鎖科六隨品長分科七隨其本會科八本末大位科九本末遍收科十主伴無盡科此後乃隨文科釋一心奉請華嚴經隨疏演義鈔拜觀同上即清涼自釋前疏一心奉請大方廣佛華嚴經疏鈔拜觀同上即前疏中懸談合鈔別行一心奉請華嚴一乘教義分劑章拜觀同上唐京大薦福寺沙門法藏述開釋如來海印三昧一乘教義略作十門建立一乘第一教義攝益第二古今立教第三分教開宗第四乘教開合第五起教前後第六決擇其義第七施設異相第八所詮差別第九義理分劑第十一心奉請華嚴經指歸拜觀同上法藏述一説經處二説經時三説經佛四説經衆五説經儀六辨經教七顯經義八釋經意九明經益十示經圓於十門中各明十意一心奉請華嚴經明法品內立三寶章拜觀同上法藏述一三寶章略作八門二流轉章略作十門三法界緣起略陳四門四圓音章略作四門五法身章四門分別六十世章義作二門七𢆯義章又分十門一心奉請大方廣圓覺修多羅了義經疏及略疏之鈔拜觀同上唐終南山草堂寺沙門宗密述圭峯為華嚴五祖然華嚴義蘊經歷初祖法順之法界觀華嚴二祖智儼之千𢆯門華嚴三祖法藏之五教十儀已闡發矣故別宏圓覺以紹四祖澄觀華嚴疏鈔之後一心奉請佛説阿彌陀經疏拜觀同上唐新羅國沙門元曉述三門分別初述大意二釋經宗致三入文釋正宗分中以發菩提心釋多善根福德因緣名為正行一日乃至七日持名名為助行雖立説稍偏而高出時流之見一心奉請佛説觀無量壽佛經疏拜觀同上陳隋天台智者智顗述此經以心觀為宗實相為體所言佛説觀無量壽佛者佛是所觀勝境舉正報以收依果述化主以包徒衆觀雖十六言佛便周也從能説所説人以立名以心觀淨則佛土淨為宗致生善滅惡為經力用大乘方等而為教相二藏中菩薩藏收頓漸中此為頓教也從如是至清淨業處為序分從爾時世尊放眉間光至諸天發無上道心為正説分爾時阿難白佛下為流通分一心奉請楞伽阿跋多羅寶經注解拜觀同上出元藏一心奉請維摩詰所説經注拜觀同上出元藏一心奉請維摩詰所説經疏拜觀同上出元藏一心奉請四教義拜觀同上天台山修禪寺沙門智顗撰第一釋四教名為五一正釋二核定三引證四料簡五明經論用教多少不同第二辨所詮為四一約四諦理二約三諦理三約二諦理四約一諦理第三明四門入理為五一略辨四門相二正明四門入理三悉檀起四門教四約十法成門義五信法兩行四行不同第四明判位不同為六一藏二通三別四圓五五味結成六經論教多少第五明權實第六約觀心第七通諸經論此三科未説一心奉請金光明經𢆯義拜觀同上天台智者智顗述門人灌頂録一心奉請金光明經文句拜觀同上智顗述灌頂録一心奉請盂蘭盆經疏拜觀同上唐充國沙門宗密述一心奉請首稜嚴經義海拜觀同上宋長水沙門子璿集義疏注經并科泐潭沙門曉月標指要義吳興沙門仁嶽集解福唐沙門咸輝排經入注一心奉請大佛頂首稜嚴經會解拜觀同上師子林沙門惟則集九家解並為補注一興福慤二資中沇三真際節四檇李敏五長水璿六孤山圓七吳興嶽八泐潭月九溫陵環一心奉請觀音經疏拜觀同上天台智者智顗述弟子灌頂記一心奉請金剛般若經疏拜觀同上天台智者智顗述法譬標名若見諸相非相即見如來是經正體約實相慧行無相檀如人有目日光明照見種種色是因諸相非相是果此之因果同約實相為宗破諸相惑顯出功能亦自無滯即力用也教相可知一心奉請金剛經論疏纂要拜觀同上唐大興福寺沙門宗密述宋長水沙門子璿重治科經約天親釋義兼無著傍及餘論疏一心奉請釋金剛經刊定記拜觀同上宋長水沙門子璿録石壁於纂要別為廣録今師病其繁長更為刊定一心奉請仁王護國般若經疏拜觀同上天台智者智顗説門人灌頂記一心奉請般若波羅蜜多心經略疏拜觀同上唐翻經沙門法藏述一心奉請般若波羅蜜多心經集注拜觀同上明天界寺僧宗泐演福寺僧如玘同集共集賢首孤山古雲佛海四家注疏一心奉請妙法蓮華經𢆯義拜觀同上智者説門人灌頂録妙名不可思議也法者十界十如權實之法也蓮華者譬權實之法也良以妙法難解假喻乃彰一為蓮故華喻為實施權二華開蓮現喻開權顯實三華落蓮成廢權立實權實之喻如此本迹之喻亦然凡𢆯義多是五重一釋名二辨體三明宗四論用五判教一心奉請妙法蓮華經文句拜觀同上智者説門人灌頂録初品為序方便品訖分別功德十九行偈凡十五品半名正從偈後盡經凡十一品半為流通又序品至安樂行品約迹涌出以下十四品約本本迹各序正流通消文為四一因緣二約教三本迹四觀心因緣亦名感應衆生無機雖近不見慈善根力遠而自通感應道交故用因緣釋也夫衆生求脫此機衆矣聖人起應應亦衆矣今論娑婆國土音聲佛事則甘露門開故用約教釋也若應機説教教有權實淺深不同須置指存月亡迹存本故用本迹釋也若尋迹迹廣徒自疲勞若尋本本高高不可極日夜數他寶身無半錢分但觀己心之高廣叩無窮之聖應機成致感逮得己利故用觀心釋也初序品者如是等五事冠於經首次序也放光六瑞發起之端由序也問答釋疑正説弄引述序也二從方便品至學無學人記品是迹門正説更為兩一從此以下是略開三顯一二從告舍利弗汝已殷勤三請是廣開三顯一凡七品半文為三一從此至譬喻品盡回向佛道是為上根人法説二從爾時舍利弗白佛下至授記品是為中根人譬説三化城喻下三品是為下根人因緣説三法師下五品是迹本流通從地涌出品第十五是本門發起序壽量品第十六是正開近迹顯遠本分別功德品第十七於中佛説長行為總授法身記彌勒説偈為總申領解正宗分竟此後并下三品為勸持流通神力品第二十一乃至普賢菩薩勸發品第二十八為付囑流通一心奉請觀音玄義拜觀同上智者説門人灌頂録此別釋法華經中觀世音菩薩普門品也一心奉請觀音義疏拜觀同上智者説門人灌頂録有時作序正流通三段有時不用此三名但分三章一無盡意二佛答三持地歎或為四章三如前四者聞品得益或作二段謂前後兩問答也多種分章隨人意用文中亦作因緣乃至觀心等釋一心奉請妙法蓮華經要解拜觀同上宋溫陵開元蓮寺沙門戒環解科此經二十八品序分一品正宗分十九品流通分八品一心奉請大般涅槃經𢆯義拜觀同上隋天台沙門灌頂撰一心奉請大般涅槃經疏拜觀同上灌頂撰唐天台沙門湛然再治一召請涅槃衆從初如是至流血灑地二開演涅槃施從純陀訖大衆問三示涅槃行從現病至德王四問答涅槃義師子吼訖品五折攝涅槃用從迦葉訖經一心奉請佛遺教經論疏節要拜觀同上宋晉水高麗國沙門淨源述大意宗天親而訛謂馬鳴一心奉請菩薩戒義疏拜觀同上智者説三重𢆯義一名二體三料簡從初偈長行至清淨者為序次十重訖現在菩薩今誦為正説餘盡卷為勸説流通一心奉請般若波羅蜜多心經注解拜觀同上明天界善世禪寺住持僧宗泐演禪講寺住持僧如玘同奉詔注以上兩土釋論
