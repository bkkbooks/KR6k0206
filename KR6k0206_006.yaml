body:
  text: 一心奉請瑜伽師地論拜觀同上彌勒菩薩說唐大慈恩寺沙門釋玄奘譯本地分第一一五識身相應地二意地三有尋有伺地四無尋惟伺地五無尋無伺地六三摩呬多地七非三摩呬多地八有心地九無心地十聞所成地十一思所成地十二修所成地十三聲聞地十四獨覺地十五菩薩地十六有餘依地十七無餘依地如是略說十七名為瑜伽師地後有三分攝決擇分攝釋分攝事分一心奉請菩薩地持經拜觀同上北涼中天竺沙門曇無讖譯即瑜伽本地分中第十五菩薩地異譯缺第四持一心奉請決定藏經拜觀同上陳優禪尼國沙門真諦譯瑜伽決擇分中五識身相應地意地異譯一心奉請王法正理論拜觀同上唐大慈恩寺沙門釋玄奘譯瑜伽決擇分中尋伺地別出一心奉請顯揚聖教論拜觀同上無著菩薩造玄奘譯攝事品攝淨義品成善巧品成無常品成苦品成空品成無性品成現觀品成瑜伽品成不思議品攝勝決擇品一心奉請顯揚聖教論頌拜觀同上玄奘譯一心奉請大乘阿毗達磨集論拜觀同上無著菩薩造玄奘譯本事分中三法品第一謂蘊界處攝品第二十一種相界種類分位伴方時一分具分更互勝義相應品第三有六種不相離和合集聚俱有作事同行成就品第四有三種種子自在現行決擇分中諦品第一四聖諦法品第二十二分教得品第三一建立補特伽羅有七種二建立現觀有十種論議品第四有七種義釋分別顯示等論攝論軌祕密一心奉請大乘阿毗達磨襍集論拜觀同上安慧菩薩集玄奘譯一心奉請辯中邊論頌拜觀同上彌陀菩薩說玄奘譯辯相品辯障品辯真實品辯修對治品辯修分位品辯得果品辯無上乘品一心奉請辯中邊論拜觀同上天親菩薩造論釋前頌一心奉請中邊分別論拜觀同上陳優禪尼國沙門真諦譯與上同本一心奉請攝大乘論本拜觀同上無著菩薩造唐大慈恩寺沙門釋玄奘譯總標綱要分第一標十相勝殊勝語所知依分第二明阿賴耶識及意所知相分第三明三性相一依他起相二徧計所執相三圓成實相入所知相分第四明三種練磨其心及四尋思四如實徧智彼入因果分第五明六種波羅蜜彼修差別分第六明菩薩歡喜等十地也增上戒學分第七明三聚戒增上心學分第八明六種差別一所緣二種種三對治四堪能五引發六作業增上慧學分第九明無分別智離五種相果斷分第十明轉依有六種彼果智分第十一明佛三身一心奉請攝大乘論拜觀同上元魏北天竺沙門佛陀扇多譯與唐本同而不分品一心奉請攝二乘論拜觀同上陳優禪尼國沙門真諦譯亦與上同分作十品一心奉請棱伽經唯識論拜觀同上一名破色心論天親菩薩造元魏北天竺沙門菩提留支譯一立義二引證三譬喻及釋種種外難成立唯識道理一心奉請大乘唯識論拜觀同上陳優禪尼國沙門真諦譯與棱伽唯識略為大同一心奉請唯識二十論拜觀同上唐大慈恩寺沙門釋玄奘譯一心奉請唯識三十論拜觀同上世親菩薩造玄奘譯即成唯論本頌也一心奉請大乘成業論及業成就論拜觀同上世親菩薩造玄奘譯第二元魏烏萇國沙門毗目智仙譯明身語意及有表無表業是實非實唯依思立及由異熟識受熏持種而得成就第二同一心奉請大乘五蘊論拜觀同上世親菩薩造玄奘譯明五蘊攝九十四法及十二處十八界總攝百法對治三種我執謂一性我執受者我執作者我執如其次第以蘊處界治之一心奉請因明正理門論本及因明正理門論拜觀同上西域龍樹菩薩造玄奘譯第二唐大薦福寺沙門釋義淨譯為欲簡持能立能破義中真實故造斯論第二同一心奉請因明入正理論拜觀同上商羯羅主菩薩造玄奘譯明真能立真能破真現量真比量及似能立等共八門以辯悟他自悟二益一心奉請大乘百法明本論拜觀同上天親菩薩造玄奘譯瑜伽本事分中略錄名數一心奉請觀所緣緣論拜觀同上陳那菩薩造玄奘譯一心奉請無相思塵論拜觀同上陳優禪尼國沙門真諦譯與觀所緣緣同一心奉請無相論拜觀同上真諦譯為顯法空故說諸法無自性品謂依三性說三無性此出無性論中一心奉請顯識論顯識品拜觀同上真諦譯明三界但有二種識一者顯識即是本識二者分別識即是意識顯識起分別分別起熏習熏習起顯識故生死流轉又云一執著分別性熏習增長阿賴耶識二觀習真實性熏習損阿賴耶識一心奉請轉識論拜觀同上真諦譯明轉識有二種一轉為眾生二轉為法此二實無但是識轉作二相貌次明能緣有三種一果報識即阿梨耶二執識即阿陀那三塵識即六識及明相應心所等一心奉請大乘起信論拜觀同上馬鳴菩薩造唐于闐國沙門實叉難陀譯一作因分明造論因緣有八種二立義分有二一有法謂一切眾生心二法謂體相用三大三解釋分有三一顯示實義依於一心有真如生滅二門二對治邪執治人法二種我見三分別修行正道相信成就發心解行發心證發心四修信分謂有四種信真如及三寶修五門行能成此信一施二戒三忍四精進五止觀又明求生淨土得不退轉五利益分一心奉請大乘起信論拜觀同上蕭梁優禪尼國沙門真諦譯與上略同一心奉請大宗地玄文本論拜觀同上馬鳴菩薩造陳優禪尼國沙門真諦譯歸依德處無邊大決擇分第一歸依德處因緣大決擇分第二此二是序分也一種金剛道路大決擇分第三明五種本位一者無超次第漸轉位謂五十一位如次無超轉一中具一切名為漸轉位二者無餘究竟總持位五十一位中隨其先得入攝一切一切名無餘究竟回向則信心信心則佛地佛地則十地究竟有何次三者周遍圓滿廣大位五十一種位無前後一時俱轉俱行故名周遍圓滿四者一切諸法俱非位諸無量無邊一切種種位皆悉非建立名俱非位地五者一切諸法俱是位一切種種法無非金剛身以一身義故名為俱是位金剛寶輪山王大決擇分第四乃至大不可思議重重不可稱量阿說本王大決擇分第三十六以上三十四分正名玄文本論較量功德讚歎信行現示利益大決擇分第三十七較量過患訶責誹謗現示罪業大決擇分第三十八現示本因決定證成除疑生信大決擇分第三十九勸持流通發大願海大決擇分第四十此四分皆是流通一心奉請十二門論拜觀同上龍樹菩薩造姚秦天竺沙門鳩摩羅什譯觀因緣門第一觀有果無果門第二觀緣門第三觀相門第四觀有相無相門第五觀一異門第六觀有無門第七觀性門第八觀因果門第九觀作者門第十觀三時門第十一觀生門第十二以此諸門得入空義一心奉請菩提心離相論拜觀同上龍樹造宋北印土沙門施護譯由大悲為體達蘊處界等諸相唯心所現成就第一空義則能以眾生為所緣境現種種相說種種法皆真實義一心奉請菩提資糧論拜觀同上聖者龍樹本比丘自在釋隨南天竺沙門達摩笈多譯明般若波羅蜜為菩提初資糧乃至第十度四無量心五悔勝行勿於他菩提起瞋心勿謗所未解甚深經善修三解脫門應勤精進持戒習定修三十七菩提分法種三十二大人相業及諸種種菩薩行等一心奉請發菩提心論拜觀同上天親菩薩造姚秦三藏沙門鳩摩羅什譯勸發品發心品願誓品檀那波羅蜜品尸波羅蜜品羼提波羅蜜品毗離耶波羅蜜品禪波羅蜜品般若波羅蜜品如實法門品空無相品功德持品一心奉請廣釋菩提心論拜觀同上蓮華戒菩薩造宋北印土沙門施護譯引諸經以明大悲為本慧及方便一切時常行及明聞思修三慧一心奉請菩提心觀釋拜觀同上宋中印土沙門法天譯略釋菩提心非性非相無生無滅非覺非無覺等一心奉請大乘法界無差別論及大乘法界無差別論拜觀同上堅慧菩薩造唐于闐國沙門提雲般若譯二本同第二亦名如來藏論明菩提心略說有十二種義一心奉請壹輸盧迦論拜觀同上龍樹菩薩造元魏中天竺婆羅門瞿曇般若流支譯明一切法無常自體空自體空不離無常非離諸行而有無常一心奉請十頌如理論拜觀同上龍樹菩薩造宋北印土沙門施護譯明諸法離有無二邊不可說有性不可說無性等一心奉請大乘二十頌論拜觀同上龍樹造施護譯略明第一義無生隨轉而無性義一心奉請大乘破有論拜觀同上龍樹造施護譯略說諸法無生從分別起一心奉請方便心論拜觀同上龍樹造後魏西域沙門吉迦夜與曇曜譯明造論品第一此論分別有八種義一譬喻二隨所執三語善四言失五知因六應時語七似因非因八隨語難明負處第二辨正論品第三相應品第四問答相應二十種一心奉請迴諍論拜觀同上後魏烏萇國沙門毗目智仙等譯先說外人難一切法無體則語言亦無體如何能遮一切法次申正義一切法因緣生語言亦因緣生同皆無體如以幻人還遮幻人若人信於空彼人信一切若人不信空彼不信一切一心奉請中論拜觀同上龍樹菩薩造青目菩薩釋五百偈姚秦天竺沙門鳩摩羅什譯破因緣品破去來品破六情品破五蘊品破六種品破染染者品觀三相品破作作者品破本住品破然可然品破本際品破苦品破行品破合品觀有無品觀縛解品觀業品觀法品觀時品觀因果品觀成敗品觀如來品觀顛倒品觀四諦品觀涅槃品觀十二因緣品觀邪見品一心奉請般若燈論拜觀同上唐中天竺沙門波羅頗迦羅蜜多羅譯分別明菩薩釋龍樹五百偈詳於青目一心奉請大乘中觀釋論拜觀同上安慧菩薩造宋譯經院沙門惟淨等譯僅釋十三品一心奉請順中論拜觀同上龍勝菩薩造阿僧佉解未解者別為此部阿僧佉即無著也元魏中天竺婆羅門瞿曇般若流支譯論義入大般若波羅蜜經初品法門一心奉請百字論拜觀同上提婆菩薩造元魏北天竺沙門菩提流支譯破我見等一切諸法各有自相一心奉請百論拜觀同上提婆菩薩造婆藪開士釋姚秦天竺沙門鳩摩羅什譯捨罪福品破神品破一品破異品破情品破塵品破因中有果品破因中無果品破常品破空品一心奉請廣百論本拜觀同上聖天菩薩造唐大慈恩寺沙門釋玄奘譯破常品破我品破時品破見品破根境品破邊執品破有為相品教誡弟子品皆五言偈一心奉請十八空論拜觀同上亦作十六亦作十四陳優禪尼國沙門真諦譯為顯人法二無我是一切法通相今約諸法種類不同開為十八一心奉請取因假設論拜觀同上陳那菩薩造唐大薦福寺沙門釋義淨譯說佛化眾生但依假施設事而宣法要一心奉請觀總相論頌拜觀同上陳那造義淨譯一心奉請掌中論拜觀同上陳那造義淨譯論三界但有假名實無外境如繩作蛇想見繩知蛇無一心奉請解拳論拜觀同上陳那造陳優禪尼國沙門真諦譯一心奉請入大乘論拜觀同上堅意菩薩造北涼沙門釋道泰譯義品第一明大乘方為具足三藏得成大果饑論空品第二明十地成就福智果智及明佛生羅睺羅是化非實順修諸行品第三明佛法身在淨居受職成道非閻浮提成佛及明應禮初發心菩薩一心奉請佛性論拜觀同上天親菩薩造陳優禪尼國沙門真諦譯第一緣起分如來為除五種過失生五功德故說一切眾生皆有佛性第二破執分內有破小乘品破外道品破大乘見品第三顯體分內有三因如品三性品如來藏品第四辨相分內有自體相品明因品顯果品事能品總攝品分別品階位品遍滿品無變異品無差別品一心奉請究竟一乘寶性論拜觀同上元魏中天竺沙門勒那摩提譯教化品佛寶品法寶品僧寶品一切眾生有如來藏品無量煩惱所纏品為何義說法品身轉清淨成菩提品如來功德品自然不休息佛業品較量信功德品初一卷是論本偈經次四卷如次論釋一心奉請大乘寶要義論拜觀同上宋中印土沙門法護等譯集諸經論菩薩發心修行功德一心奉請大乘集菩薩學論拜觀同上法稱菩薩造法護等譯集布施學品護持正法戒品護法師品空品集離南戒學品護身品護受用福品清淨品忍辱品精進波羅蜜品說阿蘭若品治心品內有禪定波羅蜜多念處品自性清淨品正念受用品增長勝力品恭敬作禮品念三寶品一心奉請大乘相論拜觀同上覺吉祥智菩薩造施護譯釋蘊處界緣生波羅蜜十地十八空三十七助道四諦四禪四無量四等至八解脫六神通三解脫門陀羅尼力無所畏無礙解大慈大悲不共法聲聞果了知一切相真如實際無相法界一心奉請集諸法寶最上義論拜觀同上善寂菩薩造施護譯諸法從緣生不離識菩提無所得剎那王所即菩提相菩提中無所安立若執無因不集諸福起染著感惡趣智者如實信解尊重恭敬即得最上福聚一心奉請六明教授習定論拜觀同上菩著菩薩本世親菩薩釋唐大薦福寺沙門釋義淨譯明修定須師資圓滿所緣圓滿作意圓滿依有尋有伺等三定能獲福得果一心奉請大乘莊嚴經論拜觀同上無著菩薩造唐中天竺沙門波羅頗迦羅蜜多羅譯緣起品成宗品以一因成立大乘真是佛說歸依品明大乘歸依有四種大義一切遍勇猛得果不及種性品有九有體最勝自性相貌品類過惡功德金喻寶喻發心品發心有四種大勇猛大方便大利益大出離大有四差別信行發心淨依發心報得發心無障發心大悲為根利物為依止大乘法為所信種智為所緣以勝欲為所乘以大護為所住大護謂戒也以受障為難以增善為功德以福智為自性以習諸度為出離以地滿為究竟二利品真實品明第一義相神通品成熟品菩提品明得一切種智明信品述求品宏法品隨修品教授品業伴品明菩薩起業以方便為伴度攝品供養品親近品梵住品明慈悲喜捨覺分品功德品行住品敬佛品一心奉請大莊嚴經論拜觀同上馬鳴菩薩造姚秦天竺沙門鳩摩羅什譯廣集種種善惡因緣令人返邪歸正一心奉請菩薩本生鬘經拜觀同上宋譯經院沙門慧絢紹德等譯前四卷勝勇護國尊者集如來事迹十四條後十二卷是寂變勝天論菩薩施行莊嚴尊者護國本生之義三十四段一心奉請大丈夫論拜觀同上提婆羅菩薩造北涼沙門釋道泰譯共有二十九品廣說悲心行施相貌功德一心奉請提婆菩薩破棱伽經中外道小乘四宗論拜觀同上元魏北天竺沙門菩提留支譯先列僧佉計一毗世計異尼犍子計俱若提子計不俱次一一破之一心奉請提婆菩薩釋棱伽經中外道小乘涅槃論拜觀同上菩提留支譯先明所計涅槃有二十種如來為遮是等邪見故說涅槃因果正義次列其名一一問答示相一心奉請大乘掌珍論拜觀同上清辯菩薩造唐大慈恩寺沙門釋玄奘譯廣釋真性有為空四句義破諸異執顯真勝義一心奉請如實論拜觀同上天親菩薩造陳優禪尼國沙門真諦譯反質難中無道理難品道理難品墮負處品有二十二一心奉請手杖論拜觀同上尊者釋迦稱造唐大薦福寺沙門釋義淨譯破世異執有新生有情一心奉請寶行王正論拜觀同上陳優禪尼國沙門真諦譯安樂解脫品十善名安樂惑盡名解脫襍品第二明十惡過患廣訶女身不淨歎佛三十二相菩提資糧品第三明相好六通等因正教王品第四出家正行品第五說出家者應捨麤惑修七聖財及說十地大意并教發願方法一心奉請佛說法集名數經拜觀同上宋北印土沙門施護譯集世出世二法名數一心奉請惟日襍難經拜觀同上吳月支國優婆塞支謙譯大意說如來二乘功德差別一心奉請五門禪經要用法拜觀同上大禪師佛陀蜜多所撰劉宋罽賓國沙門曇摩蜜多譯一安般二不淨三慈心四觀緣五念佛一心奉請坐禪三昧法門經拜觀同上僧伽羅剎造姚秦天竺沙門鳩摩羅什譯第一治婬欲次瞋恚三愚癡四思覺五等分及重罪人明四禪四空四等五通法四念止法大乘念佛等法一心奉請禪法要解經拜觀同上姚秦天竺沙門鳩摩羅什譯初不淨觀次淨觀除五葢修初二三四禪修四無量修四空修四諦初習有十事心專正質直慚愧不放逸遠離少欲知足心不繫著不樂世樂忍辱修四如意足五神通一心奉請思惟要略法拜觀同上鳩摩羅什譯先明形輕微心病深重次四無量觀白骨觀觀佛三昧法身觀十方諸佛觀觀無量壽觀實相法華三昧觀一心奉請菩薩訶色欲法拜觀同上鳩摩羅什譯謂是世間枷鎖重患衰禍捨之復念如出獄思入等凡夫為色僕棄之如破枷脫銷等女人言蜜心毒如龍淵師窟不可近敗國亂家滅人慧明如高羅蜜網等智者知而遠惡而穢之一心奉請禪要訶欲經拜觀同上失譯師名即前不淨觀一章一心奉請小道地經拜觀同上後漢西域沙門支曜譯說道人求息及求向佛道法一心奉請修行道地經拜觀同上天竺沙門眾護撰西晉月支國沙門竺法護譯集散品五陰本品五陰相品分別五陰品五陰成敗品慈品除恐怖品分別行相品勸意品離顛倒品曉了食品伏勝諸根品忍辱品棄加惡品天眼見始終品天耳品念往世品知人心念品地獄品勸悅品行空品神足品數息品觀品學地品無學地品無學品弟子三品修行品緣覺品菩薩品一心奉請道地經拜觀同上後漢安息國沙門安世高譯從修行道地經略出一心奉請眾經撰襍譬喻拜觀同上比丘道略集姚秦天竺沙門鳩摩羅什譯一心奉請舊襍譬喻經拜觀同上西土聖賢集吳沙竺天門康僧會譯一心奉請襍譬喻經拜觀同上失譯人名出後漢錄一心奉請襍譬喻經拜觀同上後漢月支國沙門支婁迦讖譯一心奉請菩提行經拜觀同上宋中印土沙門天息灾譯一心奉請讚法界頌拜觀同上聖龍樹菩薩造宋北印土沙門施護譯一心奉請佛三身讚拜觀同上宋中印土沙門法賢譯一心奉請佛一百八名讚拜觀同上宋中印土沙門法天譯一心奉請一百五十讚佛頌拜觀同上尊者摩咥利制吒造唐沙門義淨譯一心奉請佛吉祥德讚拜觀同上宋北印土沙門施護譯一心奉請聖觀自在菩薩功德讚拜觀同上西方賢聖集施護譯一心奉請讚觀世音菩薩頌拜觀同上唐佛授記寺翻經沙門釋慧智譯一心奉請聖者文殊師利發菩提心願文拜觀同上元甘泉馬蹄山沙門釋智慧譯一心奉請大聖文殊師利菩薩讚佛法身禮拜觀同上唐北天竺沙門大廣智不空譯一心奉請百千頌大集經地藏菩薩請問法身讚拜觀同上大廣智不空譯讚法身法界菩提涅槃十地等妙功德一心奉請廣發大願頌拜觀同上以上西土宗論
