body:
  text: 一心奉請四分律藏拜觀同上姚秦罽賓國沙門佛陀那舍共竺佛念譯第一分比丘戒第二分比丘尼戒內有受戒犍度說戒犍度第三分安居犍度自恣揵度皮革犍度衣犍度藥犍度迦絺那衣犍度拘睒彌犍度瞻波犍度訶責犍度人犍度覆藏犍度遮犍度破僧犍度滅諍犍度比丘尼犍度法犍度第四分房舍犍度襍犍度五百結集法七百結集毗尼調部毗尼毗尼增一一心奉請四分戒本四分戒本比丘尼戒本拜觀同上姚秦罽賓國沙門佛陀耶舍譯二三唐西太原寺沙門釋懷素依律集出一心奉請曇無德律部羯磨羯磨四分比丘尼羯磨法四分僧羯磨尼羯磨拜觀同上曹魏天竺沙門康僧鎧譯第二曹魏沙門釋曇諦譯第三劉宋中天竺沙門求那䟦摩譯第四五唐西太原寺沙門釋懷素集一心奉請摩訶僧祗律波羅提木叉僧祇戒本比丘尼僧祇律波羅提木叉戒經拜觀同上東晉迦維羅衛國沙門佛陀䟦陀羅共法顯譯第二同第三東晉平陽沙門釋法顯共覺賢譯初明四棄二明十三事三明二不定四明三十事五明九十二事六明四事七明眾學事八明滅諍法九襍誦䟦渠明受戒治罪乃至一切僧中襍事十威儀法比丘尼毗尼一心奉請彌沙塞部五分律五分戒本拜觀同上劉宋罽賓國沙門佛陀什竺道生共譯第二蕭梁建初寺沙門釋明徽集初分比丘律第二分尼律第三分受戒法布薩法安居法自恣法衣法皮革法藥法食法迦絺那衣法第四分滅諍法羯磨法第五分破僧法臥具法襍法威儀法遮布薩法別住法調伏法毗尼法明比丘尼受戒事五百集法七百集法第二亦名彌沙塞戒本一心奉請五分比丘尼戒本拜觀同上明徽集一心奉請彌沙塞羯磨本拜觀同上唐天水沙門釋愛同錄一心奉請十誦律拜觀同上姚秦罽賓國沙門弗若多羅與鳩摩羅什共譯初誦六卷四事至三十事之前十事第二誦七卷三十事之中後二十事九十事之前四十事第三誦七卷九十事之後五十事乃至七滅諍法第四誦八卷受具足法布薩法自恣法安居法皮革法醫藥法衣法第五誦七卷迦絺那衣法俱舍彌法佛在俱舍彌時諸羯磨事瞻波法佛在瞻波國時諸羯磨事苦切羯磨法梵云那般茶盧伽法二篇悔法順行法遮法臥具法諍事法廣明滅諍第六襍誦五卷第七誦尼律五卷第八誦增一法四卷第九誦優波離問四卷第十善誦四卷一心奉請十誦毗尼序及十誦比丘戒本十誦比丘尼戒本大沙門百一羯磨法十誦羯磨比丘要用拜觀同上東晉罽賓國沙門卑摩羅叉續譯第二鳩摩羅什譯第三劉宋燉煌沙門法頴集出第四附宋錄第五劉宋吳國沙門釋僧璩依律撰出一心奉請薩婆多毗尼毗婆沙拜觀同上附三秦錄一心奉請薩婆多毗尼摩得勒伽拜觀同上劉宋天竺沙門僧伽跋摩譯一心奉請根本說一切有部毗柰耶根本說一切有部苾蒭尼毗柰耶根本說一切有部毗柰耶襍事根本說一切有部毗柰耶破僧事根本說一切有部尼陀那目得迦根本說一切有部百一羯磨根本說一切有部戒經根本說一切有部苾蒭尼戒經根本說一切有部毗柰耶尼陀那目得迦攝頌襍事攝頌根本薩婆多部律攝根本說一切有部毗柰耶頌拜觀同上唐大薦福寺沙門釋義淨譯第十尊者勝友造十一尊者毗舍佉造一心奉請根本說一切有部出家授近圓羯磨儀軌及苾蒭習略法拜觀同上二本元帝師苾蒭拔合思巴集一心奉請戒因緣經拜觀同上姚秦涼州沙門竺佛念譯一心奉請解脫戒本經拜觀同上出迦葉毗部元魏中天竺婆羅門瞿曇般若流支譯一心奉請善見毗婆沙律拜觀同上蕭齊西域沙門僧伽䟦陀羅譯一心奉請毗尼母經拜觀同上附秦錄一心奉請佛阿毗曇經拜觀同上陳優禪尼國沙門真諦譯一心奉請舍利弗問經拜觀同上東晉錄失譯人名一心奉請優波離問經拜觀同上劉宋中天竺沙門求那䟦摩譯一心奉請佛說目連所問經及犯戒眾輕重經拜觀同上宋中印土沙門法天譯第二安世高譯二經同一心奉請迦葉禁戒經拜觀同上劉宋居士沮渠京聲譯一心奉請律二十二明了論拜觀同上正量部佛陀多羅多法師造陳優禪尼國沙門真諦譯一心奉請大比丘三千威儀拜觀同上後漢安息國沙門安世高譯一心奉請沙彌十戒法并威儀及沙彌威儀佛說沙彌十戒儀則經拜觀同上附東晉錄第二求那䟦摩譯第三施護譯一心奉請沙彌尼戒經及沙彌尼離戒文拜觀同上今在漢錄第二失譯人名一心奉請佛說優婆塞五戒相經拜觀同上劉宋中天竺沙門求那䟦摩譯佛在迦維羅衛國淨飯王請為優婆塞分別五戒可悔不可悔者佛言不犯成佛道犯者三塗一心奉請佛說戒消灾經拜觀同上吳月支國優婆塞支謙譯持歸戒人鬼神畏避二人受五戒同四百九十八人見佛皆證果一心奉請佛說大愛道比丘尼經拜觀同上北涼錄失譯人名一心奉請佛說苾蒭五法經拜觀同上宋中印土沙門法天譯說五法得離依止等及說戒七種差別一心奉請佛說比丘迦尸迦十法經拜觀同上法天譯具足慚愧多聞等十法得為大師一心奉請佛說五恐怖世經拜觀同上劉宋居士沮渠京聲譯說末世不遵戒律說恐怖事一心奉請佛說齋經拜觀同上吳月支國優婆塞支謙譯說六齋日受八支五念法一心奉請佛說目連問戒律中五百輕重事經拜觀同上西晉錄失譯人名首品與犯戒罪輕重及目連所問經同餘與諸律論不盡合以上小乘律
